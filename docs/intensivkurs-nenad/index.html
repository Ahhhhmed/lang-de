t</td>\n</tr>\n</tbody>\n</table>\n<h2 id=\"lektion-13\">Lektion 13</h2>\n<table>\n<thead>\n<tr>\n<th>Infinitiv</th>\n<th>Perfekt</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>verwenden</td>\n<td>hat verwendet</td>\n</tr>\n<tr>\n<td>braten</td>\n<td>hat gebraten</td>\n</tr>\n</tbody>\n</table>\n<h2 id=\"lektion-14\">Lektion 14</h2>\n<table>\n<thead>\n<tr>\n<th>Infinitiv</th>\n<th>Perfekt</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>beobachten</td>\n<td>hat beobachtet</td>\n</tr>\n<tr>\n<td>ausgeben</td>\n<td>hat ausgegeben</td>\n</tr>\n<tr>\n<td>beschreiben</td>\n<td>hat beschrieben</td>\n</tr>\n<tr>\n<td>nennen</td>\n<td>hat genannt</td>\n</tr>\n<tr>\n<td>backen</td>\n<td>hat gebacken</td>\n</tr>\n</tbody>\n</table>\n<h2 id=\"lektion-15\">Lektion 15</h2>\n<table>\n<thead>\n<tr>\n<th>Infinitiv</th>\n<th>Perfekt</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>basteln</td>\n<td>hat gebastelt</td>\n</tr>\n<tr>\n<td>gratulieren</td>\n<td>hat gratuliert</td>\n</tr>\n<tr>\n<td>(sich) langweilen</td>\n<td>hat (sich) gelangweilt</td>\n</tr>\n<tr>\n<td>träumen</td>\n<td>hat geträumt</td>\n</tr>\n<tr>\n<td>ausfallen</td>\n<td>ist ausgefallen</td>\n</tr>\n<tr>\n<td>schiefgehen</td>\n<td>ist schiefgegangen</td>\n</tr>\n<tr>\n<td>übernehmen</td>\n<td>hat übernommen</td>\n</tr>\n</tbody>\n</table>\n<h2 id=\"lektion-16\">Lektion 16</h2>\n<table>\n<thead>\n<tr>\n<th>Infinitiv</th>\n<th>Perfekt</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>sich ärgern über</td>\n<td>hat sich über ... geärgert</td>\n</tr>\n<tr>\n<td>denken an</td>\n<td>hat an ... gedacht</td>\n</tr>\n<tr>\n<td>einladen zu</td>\n<td>hat zu ... eingeladen</td>\n</tr>\n<tr>\n<td>sich freuen auf/über</td>\n<td>hat sich auf/über ... gefreut</td>\n</tr>\n<tr>\n<td>gehören zu</td>\n<td>hat zu ... gehört</td>\n</tr>\n<tr>\n<td>sich informieren über</td>\n<td>hat sich über ... informiert</td>\n</tr>\n<tr>\n<td>sich interessieren für</td>\n<td>hat sich für ... interessiert</td>\n</tr>\n<tr>\n<td>träumen von</td>\n<td>hat von ... geträumt</td>\n</tr>\n<tr>\n<td>warten auf</td>\n<td>hat auf ... gewartet</td>\n</tr>\n<tr>\n<td>klatschen</td>\n<td>hat geklatscht</td>\n</tr>\n<tr>\n<td>wachsen</td>\n<td>ist gewachsen</td>\n</tr>\n<tr>\n<td>reiten</td>\n<td>ist geritten</td>\n</tr>\n<tr>\n<td>verbrennen</td>\n<td>hat/ist verbrannt</td>\n</tr>\n<tr>\n<td>sich verabschieden</td>\n<td>hat sich verabschiedet</td>\n</tr>\n<tr>\n<td>läuten</td>\n<td>hat geläutet</td>\n</tr>\n</tbody>\n</table>"}, {"id": "grammar-07-adjective-declension", "title": "Adjective Declension (Adjektivdeklination)", "file": "07-adjective-declension.md", "html": "<h2 id=\"overview\">Overview</h2>\n<p>Adjective endings depend on: <strong>gender</strong> (m/n/f/pl) × <strong>case</strong> (Nom/Akk/Dat) × <strong>article type</strong> (definite/indefinite/none).</p>\n<hr>\n<h2 id=\"nominativ\">Nominativ</h2>\n<table>\n<thead>\n<tr>\n<th>Gender</th>\n<th>Indefinite (<code>ein-</code>)</th>\n<th>Definite (<code>der/die/das</code>)</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>m</td>\n<td>ein neu<strong>er</strong> Pulli</td>\n<td>der neu<strong>e</strong> Pulli</td>\n</tr>\n<tr>\n<td>n</td>\n<td>ein blau<strong>es</strong> T-Shirt</td>\n<td>das blau<strong>e</strong> T-Shirt</td>\n</tr>\n<tr>\n<td>f</td>\n<td>eine kariert<strong>e</strong> Hose</td>\n<td>die kariert<strong>e</strong> Hose</td>\n</tr>\n<tr>\n<td>pl</td>\n<td>bunt<strong>e</strong> Sandalen</td>\n<td>die bunt<strong>en</strong> Sandalen</td>\n</tr>\n</tbody>\n</table>\n<blockquote><strong>Rule:</strong> With <code>ein-</code>, the adjective carries the gender signal. With <code>der/die/das</code>, it ends in <strong>-e</strong>.</blockquote>\n<hr>\n<h2 id=\"akkusativ\">Akkusativ</h2>\n<table>\n<thead>\n<tr>\n<th>Gender</th>\n<th>Indefinite (<code>(k)ein-</code>)</th>\n<th>Definite (<code>den/die/das</code>)</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>m</td>\n<td>(k)ein<strong>en</strong> groß<strong>en</strong> Sessel</td>\n<td>den groß<strong>en</strong> Sessel</td>\n</tr>\n<tr>\n<td>n</td>\n<td>(k)ein modern<strong>es</strong> Bett</td>\n<td>das modern<strong>e</strong> Bett</td>\n</tr>\n<tr>\n<td>f</td>\n<td>(k)eine neu<strong>e</strong> Vase</td>\n<td>die neu<strong>e</strong> Vase</td>\n</tr>\n<tr>\n<td>pl</td>\n<td>– teur<strong>e</strong> Bilder</td>\n<td>die teur<strong>en</strong> Bilder</td>\n</tr>\n</tbody>\n</table>\n<p><strong>Masculine Akkusativ examples in context:</strong></p>\n<ul>\n<li>Ich probiere einen schön<strong>en</strong> Anzug an.</li>\n<li>Ich finde den schön<strong>en</strong> Anzug zu eng.</li>\n<li>Ich gehe mit einem neu<strong>en</strong> Hut an die Kasse.</li>\n</ul>\n<p><strong>Neuter Akkusativ:</strong></p>\n<ul>\n<li>Ich probiere ein elegant<strong>es</strong> Hemd an.</li>\n<li>Ich finde das elegant<strong>e</strong> Hemd zu teuer.</li>\n</ul>\n<p><strong>Feminine Akkusativ:</strong></p>\n<ul>\n<li>Ich probiere eine braun<strong>e</strong> Bluse an.</li>\n<li>Ich gehe mit einer neu<strong>en</strong> Brille nach Hause.</li>\n</ul>\n<p><strong>Plural Akkusativ:</strong></p>\n<ul>\n<li>Ich probiere sportlich<strong>e</strong> Kleider an.</li>\n<li>Ich finde die sportlich<strong>en</strong> Kleider zu eng.</li>\n</ul>\n<blockquote><strong>Key difference Nom → Akk:</strong> Only <strong>masculine</strong> changes: <code>ein<strong>er</strong></code> → <code>ein<strong>en</strong></code>, <code>der</code> → <code>den</code>.</blockquote>\n<hr>\n<h2 id=\"dativ\">Dativ</h2>\n<p>All genders → adjective ends in <strong>-en</strong> in Dativ.</p>\n<table>\n<thead>\n<tr>\n<th>Gender</th>\n<th>Indefinite (<code>einem/einer</code>)</th>\n<th>Definite (<code>dem/der</code>)</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>m</td>\n<td>einem frisch<strong>en</strong> Apfel</td>\n<td>dem frisch<strong>en</strong> Apfel</td>\n</tr>\n<tr>\n<td>n</td>\n<td>einem grün<strong>en</strong> Gemüse</td>\n<td>dem grün<strong>en</strong> Gemüse</td>\n</tr>\n<tr>\n<td>f</td>\n<td>einer reif<strong>en</strong> Banane</td>\n<td>der reif<strong>en</strong> Banane</td>\n</tr>\n<tr>\n<td>pl</td>\n<td>– tropisch<strong>en</strong> Früchten</td>\n<td>den tropisch<strong>en</strong> Früchten</td>\n</tr>\n</tbody>\n</table>\n<p><strong>Context:</strong> <em>Ich mache einen Snack mit...</em></p>\n<ul>\n<li>einem frischen Apfel <em>(m)</em></li>\n<li>einem grünen Gemüse <em>(n)</em></li>\n<li>einer reifen Banane <em>(f)</em></li>\n<li>tropischen Früchten <em>(pl)</em></li>\n</ul>\n<blockquote><strong>Dativ plural:</strong> Noun also gets <strong>-n</strong> added: <code>Früchte</code> → <code>Früchten</code></blockquote>\n<hr>\n<h2 id=\"quick-reference-masculine-endings\">Quick Reference: Masculine Endings</h2>\n<table>\n<thead>\n<tr>\n<th>Case</th>\n<th><code>ein-</code></th>\n<th><code>der</code></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Nom</td>\n<td>-<strong>er</strong></td>\n<td>-<strong>e</strong></td>\n</tr>\n<tr>\n<td>Akk</td>\n<td>-<strong>en</strong></td>\n<td>-<strong>en</strong></td>\n</tr>\n<tr>\n<td>Dat</td>\n<td>-<strong>en</strong></td>\n<td>-<strong>en</strong></td>\n</tr>\n</tbody>\n</table>"}, {"id": "grammar-08-cases-dativ-akkusativ", "title": "Cases: Dativ & Akkusativ — Verbs, Articles, Pronouns", "file": "08-cases-dativ-akkusativ.md", "html": "<h2 id=\"verbs-that-take-akkusativ-direct-object\">Verbs that take <strong>Akkusativ</strong> (direct object)</h2>\n<table>\n<thead>\n<tr>\n<th>Verb</th>\n<th>Example</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>kaufen</td>\n<td>Ich kaufe <strong>einen</strong> Apfel.</td>\n</tr>\n<tr>\n<td>machen</td>\n<td>Du machst <strong>einen</strong> Kuchen.</td>\n</tr>\n<tr>\n<td>mögen</td>\n<td>Sie mag <strong>den</strong> Park.</td>\n</tr>\n<tr>\n<td>haben</td>\n<td>Wir haben <strong>einen</strong> Plan!</td>\n</tr>\n<tr>\n<td>brauchen</td>\n<td>Ihr braucht <strong>ein</strong> Croissant.</td>\n</tr>\n<tr>\n<td>sehen</td>\n<td>Sie haben <strong>einen</strong> Berg gesehen.</td>\n</tr>\n<tr>\n<td>treffen</td>\n<td>Ich habe meinen Freund getroffen.</td>\n</tr>\n<tr>\n<td>einladen</td>\n<td>Gestern hast du <strong>mich</strong> eingeladen.</td>\n</tr>\n<tr>\n<td>bekommen</td>\n<td>Gestern hat er ein Geschenk bekommen.</td>\n</tr>\n<tr>\n<td>mieten</td>\n<td>Wir haben ein Velo gemietet.</td>\n</tr>\n<tr>\n<td>beantworten</td>\n<td>Ihr habt die Frage beantwortet.</td>\n</tr>\n<tr>\n<td>geniessen</td>\n<td>Meine Eltern geniessen <strong>mich</strong>.</td>\n</tr>\n<tr>\n<td>fragen</td>\n<td>Er fragt den Mann nach^Dat der Zeit.</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2 id=\"verbs-that-take-dativ-indirect-object\">Verbs that take <strong>Dativ</strong> (indirect object)</h2>\n<table>\n<thead>\n<tr>\n<th>Verb</th>\n<th>Example</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>glauben</td>\n<td>Ich glaube <strong>meinem</strong> Chef.</td>\n</tr>\n<tr>\n<td>schmecken</td>\n<td>Das Essen schmeckt <strong>dem</strong> Gast.</td>\n</tr>\n<tr>\n<td>gefallen</td>\n<td>Der Film hat <strong>mir</strong> gefallen.</td>\n</tr>\n<tr>\n<td>gehören</td>\n<td>Das Land hat <strong>den</strong> Leuten gehört.</td>\n</tr>\n<tr>\n<td>passen</td>\n<td>Der Termin hat <strong>mir</strong> nicht gepasst.</td>\n</tr>\n<tr>\n<td>danken</td>\n<td>Du hast <strong>mir</strong> gedankt.</td>\n</tr>\n<tr>\n<td>helfen</td>\n<td>Er hat <strong>dir</strong> geholfen.</td>\n</tr>\n<tr>\n<td>antworten</td>\n<td>Wir haben <strong>unseren</strong> Eltern geantwortet.</td>\n</tr>\n<tr>\n<td>wehtun</td>\n<td>Ihr habt <strong>dem</strong> Kind wehgetan. / Die Hand tut <strong>mir</strong> weh.</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2 id=\"verbs-that-take-both-dativ--akkusativ\">Verbs that take both <strong>Dativ + Akkusativ</strong></h2>\n<table>\n<thead>\n<tr>\n<th>Verb</th>\n<th>Example</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>schenken</td>\n<td>Ich schenke <strong>meinem Freund</strong>^Dat <strong>einen Wein</strong>^Akk.</td>\n</tr>\n<tr>\n<td>geben</td>\n<td>Er gibt <strong>dem Kind</strong>^Dat <strong>ein Buch</strong>^Akk.</td>\n</tr>\n<tr>\n<td>bringen</td>\n<td>Kannst du <strong>mir</strong>^Dat <strong>das Brot</strong>^Akk bringen?</td>\n</tr>\n<tr>\n<td>zeigen</td>\n<td>Ich zeige <strong>dir</strong>^Dat <strong>das Foto</strong>^Akk.</td>\n</tr>\n</tbody>\n</table>\n<blockquote><strong>Word order:</strong> Dativ (indirect) comes <strong>before</strong> Akkusativ (direct) unless the Akkusativ is a pronoun → pronoun comes first.</blockquote>\n<hr>\n<h2 id=\"akkusativ-pronouns--articles\">Akkusativ Pronouns & Articles</h2>\n<table>\n<thead>\n<tr>\n<th></th>\n<th>Pronoun</th>\n<th>Article</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>m</td>\n<td><strong>ihn</strong></td>\n<td><strong>den</strong></td>\n</tr>\n<tr>\n<td>f</td>\n<td><strong>sie</strong></td>\n<td><strong>die</strong></td>\n</tr>\n<tr>\n<td>n</td>\n<td><strong>es</strong></td>\n<td><strong>das</strong></td>\n</tr>\n<tr>\n<td>pl</td>\n<td><strong>sie</strong></td>\n<td><strong>die</strong></td>\n</tr>\n<tr>\n<td>1sg</td>\n<td><strong>mich</strong></td>\n<td></td>\n</tr>\n<tr>\n<td>2sg</td>\n<td><strong>dich</strong></td>\n<td></td>\n</tr>\n<tr>\n<td>1pl</td>\n<td><strong>uns</strong></td>\n<td></td>\n</tr>\n<tr>\n<td>2pl</td>\n<td><strong>euch</strong></td>\n<td></td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2 id=\"dativ-pronouns--articles\">Dativ Pronouns & Articles</h2>\n<table>\n<thead>\n<tr>\n<th></th>\n<th>Pronoun</th>\n<th>Article</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>1sg</td>\n<td><strong>mir</strong></td>\n<td></td>\n</tr>\n<tr>\n<td>2sg</td>\n<td><strong>dir</strong></td>\n<td></td>\n</tr>\n<tr>\n<td>m</td>\n<td><strong>ihm</strong></td>\n<td><strong>dem</strong></td>\n</tr>\n<tr>\n<td>f</td>\n<td><strong>ihr</strong></td>\n<td><strong>der</strong></td>\n</tr>\n<tr>\n<td>n</td>\n<td><strong>ihm</strong></td>\n<td><strong>dem</strong></td>\n</tr>\n<tr>\n<td>1pl</td>\n<td><strong>uns</strong></td>\n<td></td>\n</tr>\n<tr>\n<td>2pl</td>\n<td><strong>euch</strong></td>\n<td></td>\n</tr>\n<tr>\n<td>pl</td>\n<td><strong>ihnen</strong></td>\n<td><strong>den</strong></td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2 id=\"indirect-questions-indirekte-fragen\">Indirect Questions (Indirekte Fragen)</h2>\n<p>Use with <code>Darf ich fragen, ...</code> / <code>Können Sie mir sagen, ...</code> / <code>Ich möchte wissen, ...</code></p>\n<table>\n<thead>\n<tr>\n<th>Type</th>\n<th>Connector</th>\n<th>Example</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>W-Frage</td>\n<td><code>warum</code>, <code>wer</code>, <code>was</code>, <code>wann</code>, <code>wo</code>, <code>wohin</code>, <code>woher</code>, <code>wie viel</code></td>\n<td>Darf ich fragen, <strong>warum</strong> ein Haar in meinem Essen ist?</td>\n</tr>\n<tr>\n<td>Ja/Nein</td>\n<td><code>ob</code></td>\n<td>Können Sie mir sagen, <strong>ob</strong> ich einen neuen Teller haben kann?</td>\n</tr>\n</tbody>\n</table>\n<blockquote><strong>Word order in indirect questions:</strong> Verb goes to the <strong>end</strong> of the subordinate clause.</blockquote>"}, {"id": "grammar-09-comparative-superlative", "title": "Comparative & Superlative (Komparativ & Superlativ)", "file": "09-comparative-superlative.md", "html": "<h2 id=\"formation\">Formation</h2>\n<table>\n<thead>\n<tr>\n<th>Positive</th>\n<th>Komparativ</th>\n<th>Superlativ</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>klein</td>\n<td>kleiner</td>\n<td>am kleinsten / der kleinste</td>\n</tr>\n<tr>\n<td>gross</td>\n<td>grösser</td>\n<td>am grössten / der grösste</td>\n</tr>\n<tr>\n<td>warm</td>\n<td>wärmer</td>\n<td>am wärmsten / der wärmste</td>\n</tr>\n</tbody>\n</table>\n<blockquote><strong>Umlaut rule:</strong> Many one-syllable adjectives add an umlaut in Komparativ/Superlativ.</blockquote>\n<hr>\n<h2 id=\"irregular-forms\">Irregular Forms</h2>\n<table>\n<thead>\n<tr>\n<th>Positive</th>\n<th>Komparativ</th>\n<th>Superlativ</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>gut</td>\n<td>besser</td>\n<td>am besten</td>\n</tr>\n<tr>\n<td>viel / sehr</td>\n<td>mehr</td>\n<td>am meisten</td>\n</tr>\n<tr>\n<td>gern</td>\n<td>lieber</td>\n<td>am liebsten</td>\n</tr>\n<tr>\n<td>nicht gern</td>\n<td>weniger gern</td>\n<td>am wenigsten gern</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2 id=\"comparing-vergleich\">Comparing (Vergleich)</h2>\n<p><strong>Komparativ + als</strong> → unequal comparison:</p>\n<ul>\n<li>Zug ist kleiner <strong>als</strong> Bern.</li>\n<li>Bern ist kleiner <strong>als</strong> Zürich.</li>\n</ul>\n<p><strong>so/gleich/ebenso/genauso + wie</strong> → equal comparison:</p>\n<pre><code class=\"language-\">Basel ist  so gross     wie Genf.\n           gleich\n           ebenso  ,   (so) wie Genf.\n           genauso</code></pre>\n<hr>\n<h2 id=\"examples\">Examples</h2>\n<ul>\n<li>Zürich ist klein. Bern ist kleiner.</li>\n<li>Zug ist <strong>am kleinsten</strong>. Zug ist kleiner als Bern.</li>\n</ul>"}, {"id": "grammar-10-prepositions", "title": "Prepositions (Präpositionen)", "file": "10-prepositions.md", "html": "<h2 id=\"wechselprpositionen-two-way-prepositions\">Wechselpräpositionen (Two-way Prepositions)</h2>\n<p>These prepositions take <strong>Dativ</strong> for location (Wo?) and <strong>Akkusativ</strong> for direction (Wohin?).</p>\n<table>\n<thead>\n<tr>\n<th>Preposition</th>\n<th>+ DAT (Wo? — location)</th>\n<th>+ AKK (Wohin? — direction)</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>in</strong></td>\n<td>Das Buch ist im Regal.</td>\n<td>Ich gehe <strong>in</strong> die Küche.</td>\n</tr>\n<tr>\n<td><strong>an</strong></td>\n<td>Er sitzt am Tisch.</td>\n<td>Er geht <strong>an</strong> den Tisch.</td>\n</tr>\n<tr>\n<td><strong>auf</strong></td>\n<td>Die Katze ist auf dem Sofa.</td>\n<td>Die Katze springt <strong>auf</strong> das Sofa.</td>\n</tr>\n<tr>\n<td><strong>neben</strong></td>\n<td>Er steht neben dem Auto.</td>\n<td>Er stellt das Rad <strong>neben</strong> das Auto.</td>\n</tr>\n<tr>\n<td><strong>über</strong></td>\n<td>Das Bild hängt über dem Bett.</td>\n<td>Er hängt das Bild <strong>über</strong> das Bett.</td>\n</tr>\n<tr>\n<td><strong>unter</strong></td>\n<td>Der Hund liegt unter dem Tisch.</td>\n<td>Der Hund läuft <strong>unter</strong> den Tisch.</td>\n</tr>\n<tr>\n<td><strong>vor</strong></td>\n<td>Er wartet vor dem Eingang.</td>\n<td>Er geht <strong>vor</strong> den Eingang.</td>\n</tr>\n<tr>\n<td><strong>hinter</strong></td>\n<td>Das Auto ist hinter dem Haus.</td>\n<td>Das Auto fährt <strong>hinter</strong> das Haus.</td>\n</tr>\n<tr>\n<td><strong>zwischen</strong></td>\n<td>Er sitzt zwischen den Stühlen.</td>\n<td>Er setzt sich <strong>zwischen</strong> die Stühle.</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2 id=\"wo-vs-wohin--woher\">Wo? vs. Wohin? / Woher?</h2>\n<table>\n<thead>\n<tr>\n<th>Wo? (location)</th>\n<th>Wohin? → / Woher? ← (direction)</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>lokal — static</td>\n<td>direktional — movement</td>\n</tr>\n<tr>\n<td>sein, arbeiten, wohnen, bleiben</td>\n<td>kommen, fahren, gehen, fliegen, segeln, joggen, reisen</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"1-wohin-gehst-du-direction--movement--akkusativ-except-zu\">1. Wohin gehst du? (Direction / Movement → Akkusativ, except <em>zu</em>)</h3>\n<table>\n<thead>\n<tr>\n<th>Preposition</th>\n<th>Target / Category</th>\n<th>Example Sentence</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>in</strong> (+ Akk)</td>\n<td>Buildings, rooms, countries with article</td>\n<td>Ich gehe <strong>ins</strong> (in + das) Büro. / <strong>ins</strong> Krankenhaus. / <strong>ins</strong> Kino. / <strong>ins</strong> Bett. / <strong>in die</strong> Bar. / <strong>in die</strong> Schweiz. / <strong>in die</strong> Kita. / <strong>in die</strong> Apotheke. / <strong>in den</strong> Coop. / <strong>in die</strong> Migros. / <strong>in die</strong> Schule.</td>\n</tr>\n<tr>\n<td><strong>zu</strong> (+ Dat)</td>\n<td>Persons, institutions</td>\n<td>Ich gehe <strong>zu</strong> Freunden. / <strong>zur</strong> (zu + der) Arbeit. / <strong>zum</strong> (zu + dem) See. / <strong>zum</strong> Bahnhof. / <strong>zu den</strong> Eltern. / <strong>zur</strong> Kita. / <strong>zur</strong> Station. / <strong>zu einem</strong> Konzert.</td>\n</tr>\n<tr>\n<td><strong>nach</strong></td>\n<td>Cities, countries without article, home</td>\n<td>Ich gehe <strong>nach</strong> Zürich. / <strong>nach</strong> Mexiko. / <strong>nach</strong> Hause.</td>\n</tr>\n<tr>\n<td><strong>an</strong> (+ Akk)</td>\n<td>Waterways, events, specific meeting spots</td>\n<td>Ich gehe <strong>an den</strong> Match. / <strong>an den</strong> See. / <strong>an die</strong> Bar.</td>\n</tr>\n</tbody>\n</table>\n<div class=\"alert alert-tip\">- <strong>in + Akkusativ</strong> = Buildings, rooms, countries (with article). - <strong>zu + Dativ</strong> = People, institutions. - <strong>nach</strong> = Cities, countries (without article), \"nach Hause\". - <strong>an + Akkusativ</strong> = Waterways, events, certain meeting points.</div>\n<hr>\n<h3 id=\"2-wo-bist-du-location--static--dativ\">2. Wo bist du? (Location / Static → Dativ)</h3>\n<table>\n<thead>\n<tr>\n<th>Preposition</th>\n<th>Target / Category</th>\n<th>Example Sentence</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>in</strong> (+ Dat)</td>\n<td>Buildings, countries, cities, rooms</td>\n<td>Ich bin <strong>im</strong> (in + dem) Büro. / <strong>im</strong> Tram. / <strong>im</strong> Krankenhaus. / <strong>im</strong> Kino. / <strong>im</strong> Bett. / <strong>im</strong> Bus. / <strong>in der</strong> Migros. / <strong>in der</strong> Apotheke. / <strong>in der</strong> Bar. / <strong>in der</strong> Schweiz. / <strong>in</strong> Zürich. / <strong>in der</strong> Kita.</td>\n</tr>\n<tr>\n<td><strong>bei</strong> (+ Dat)</td>\n<td>People, work, home</td>\n<td>Ich bin <strong>bei der</strong> Arbeit. / <strong>bei</strong> Freunden. / <strong>beim</strong> (bei + dem) Arzt. / <strong>bei den</strong> Eltern. / <strong>zu</strong> Hause (note: static home is <em>zu Hause</em>).</td>\n</tr>\n<tr>\n<td><strong>an</strong> (+ Dat)</td>\n<td>Waterways, points/stations, events</td>\n<td>Ich bin <strong>an der</strong> Bar. / <strong>am</strong> (an + dem) See. / <strong>an der</strong> Station / <strong>an der</strong> Haltestelle. / <strong>an einem</strong> Konzert.</td>\n</tr>\n</tbody>\n</table>\n<div class=\"alert alert-tip\">- <strong>in + Dativ</strong> → Buildings, countries, cities, rooms. - <strong>bei + Dativ</strong> → Persons, work, home (<em>zu Hause</em>). - <strong>an + Dativ</strong> → Waterways, meeting points, stations.</div>\n<hr>\n<h2 id=\"hin-und-her\">„hin\" und „her\"</h2>\n<table>\n<thead>\n<tr>\n<th></th>\n<th>Meaning</th>\n<th>Question</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>hin</strong></td>\n<td>away from speaker, towards destination</td>\n<td><strong>Wo</strong>hin?</td>\n</tr>\n<tr>\n<td><strong>her</strong></td>\n<td>towards speaker, away from origin</td>\n<td><strong>Wo</strong>her?</td>\n</tr>\n</tbody>\n</table>\n<p><strong>With verbs:</strong></p>\n<pre><code class=\"language-\">gehen  + hin  →  hingehen\nkommen + her  →  herkommen</code></pre>\n<hr>\n<h2 id=\"sentence-order-top-zeit--objekt--ort\">Sentence Order: TOP (Zeit — Objekt — Ort)</h2>\n<p>Time → Object → Place</p>\n<ul>\n<li><strong>Im Winter</strong> fahre ich gern <strong>Ski</strong> <strong>in den Bergen</strong>.</li>\n<li>Fährst du gern <strong>im Winter</strong> Ski <strong>in den Bergen</strong>?</li>\n<li><strong>Im Frühling</strong> lese ich immer <strong>in Zürich am See</strong>.</li>\n<li><strong>Im Juni</strong> reist du gern <strong>nach Finnland</strong>.</li>\n</ul>\n<blockquote><strong>Rule:</strong> Adverbials of <strong>time</strong> come before <strong>manner/object</strong>, which come before <strong>place</strong>.</blockquote>"}, {"id": "grammar-11-conjunctions-clause-structure", "title": "Conjunctions & Clause Structure (Satzverbindungen)", "file": "11-conjunctions-clause-structure.md", "html": "<h2 id=\"hauptsatz--hauptsatz-hs--hs--coordinating-conjunctions-position-0\">Hauptsatz + Hauptsatz (HS + HS) — Coordinating Conjunctions (Position 0)</h2>\n<p>These conjunctions do <strong>not</strong> change word order. The verb stays in <strong>position 2</strong>.</p>\n<table>\n<thead>\n<tr>\n<th>Conjunction</th>\n<th>Meaning</th>\n<th>Example</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>und</strong></td>\n<td>and</td>\n<td>Ich komme hierher <strong>und</strong> (ich) lerne Deutsch.</td>\n</tr>\n<tr>\n<td><strong>oder</strong></td>\n<td>or</td>\n<td>Trinkst du etwas <strong>oder</strong> isst du etwas?</td>\n</tr>\n<tr>\n<td><strong>aber</strong></td>\n<td>but</td>\n<td>Er reist nach Spanien, <strong>aber</strong> (er) schwimmt nicht.</td>\n</tr>\n<tr>\n<td><strong>denn</strong></td>\n<td>because/since</td>\n<td>Ihr bestellt Rösti, <strong>denn</strong> ihr habt Hunger.</td>\n</tr>\n</tbody>\n</table>\n<blockquote><code>und</code>, <code>oder</code>, <code>aber</code>, <code>denn</code> = <strong>P0</strong> — they occupy position zero, not position 1.</blockquote>\n<hr>\n<h2 id=\"inversion-connectors-position-1\">Inversion Connectors (Position 1)</h2>\n<p>These push the subject after the verb (<strong>Inversion</strong>):</p>\n<table>\n<thead>\n<tr>\n<th>Connector</th>\n<th>Meaning</th>\n<th>Example</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>deshalb</strong></td>\n<td>therefore</td>\n<td>Wir kaufen einen neuen Fernseher, <strong>deshalb</strong> möchten~V~ wir~S~ Fussball sehen.</td>\n</tr>\n<tr>\n<td><strong>darum</strong></td>\n<td>that's why</td>\n<td></td>\n</tr>\n<tr>\n<td><strong>deswegen</strong></td>\n<td>for that reason</td>\n<td></td>\n</tr>\n<tr>\n<td><strong>dann</strong></td>\n<td>then</td>\n<td><strong>Dann</strong> gehe ich nach Hause.</td>\n</tr>\n</tbody>\n</table>\n<blockquote><code>deshalb</code>, <code>darum</code>, <code>deswegen</code>, <code>dann</code> = <strong>P1</strong> — they trigger subject-verb inversion.</blockquote>\n<hr>\n<h2 id=\"nebensatz-ns--subordinating-conjunctions-verb-goes-to-end\">Nebensatz (NS) — Subordinating Conjunctions (Verb goes to END)</h2>\n<table>\n<thead>\n<tr>\n<th>Conjunction</th>\n<th>Meaning</th>\n<th>Example</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>dass</strong></td>\n<td>that</td>\n<td>Ich denke, <strong>dass</strong> Brokkoli gesund ist.</td>\n</tr>\n<tr>\n<td><strong>weil</strong></td>\n<td>because</td>\n<td>Weil es wenige Nährstoffe hat.</td>\n</tr>\n<tr>\n<td><strong>wenn</strong></td>\n<td>when / if</td>\n<td>Wenn wir Freunde einladen, (dann) putzen wir die Wohnung.</td>\n</tr>\n<tr>\n<td><strong>ob</strong></td>\n<td>whether/if</td>\n<td>Ich frage, <strong>ob</strong> du kommst.</td>\n</tr>\n</tbody>\n</table>\n<blockquote><strong>NS word order:</strong> Subject → ... → Verb (at the end) If NS comes first: NS~P1~ + Verb~V2~ + Subject~S~</blockquote>\n<hr>\n<h2 id=\"hs-vs-ns-quick-comparison\">HS vs. NS: Quick Comparison</h2>\n<table>\n<thead>\n<tr>\n<th>HS (Hauptsatz)</th>\n<th>NS (Nebensatz)</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>V at position 2</td>\n<td>V at the <strong>end</strong></td>\n</tr>\n<tr>\n<td><strong>dann</strong> (P1)</td>\n<td><strong>dass</strong></td>\n</tr>\n<tr>\n<td><strong>denn</strong> (P0)</td>\n<td><strong>weil</strong></td>\n</tr>\n<tr>\n<td></td>\n<td><strong>wenn</strong></td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2 id=\"dass-satz-expressing-opinions\">dass-Satz: Expressing Opinions</h2>\n<p>Use <code>dass</code> after opinion verbs — verb goes to end of the subordinate clause:</p>\n<ul>\n<li>Ich denke, <strong>dass</strong> Brokkoli~S~ gesund ist~V~.</li>\n<li>Ich glaube, <strong>dass</strong> Pizza~S~ lecker ist~V~.</li>\n<li>Ich finde, <strong>dass</strong> Poulet~S~ gut tut~V~.</li>\n<li>Man sagt, <strong>dass</strong> man~S~ Spargel einfach zubereitet~V~.</li>\n</ul>\n<hr>\n<h2 id=\"weil-satz-giving-reasons\">weil-Satz: Giving Reasons</h2>\n<ul>\n<li>Warum ist Fast Food schlecht? — Weil es~S~ wenige Nährstoffe hat~V~.</li>\n<li>Warum essen viele Menschen weniger Fleisch? — Weil sie~S~ sich gesund ernähren~V~.</li>\n</ul>\n<hr>\n<h2 id=\"wenn-satz-conditional--temporal\">wenn-Satz: Conditional / Temporal</h2>\n<p><strong>Real conditions (Präsens):</strong></p>\n<ul>\n<li>Was macht ihr, wenn ihr~S~ Freunde einladet~V~?</li>\n<li>Wenn wir~S~ Freunde einladen~V~, (dann) putzen~V~ wir~S~ die Wohnung.</li>\n<li>Wenn ich grossen Hunger habe, esse ich schnell etwas.</li>\n</ul>\n<p><strong>Situational Practice (wenn + Präsens):</strong></p>\n<ul>\n<li>Was machst du, wenn deine Hose im Büro reisst?</li>\n</ul>\n<p>→ Wenn meine Hose im Büro reisst, (dann) gehe ich nach Hause. / Ich gehe nach Hause, wenn meine Hose im Büro reisst.</p>\n<ul>\n<li>Was machst du, wenn deine Nachbarn die Polizei rufen, weil du zu laut bist?</li>\n</ul>\n<p>→ Wenn die Nachbarn die Polizei rufen, bereite ich das Geld für die Geldstrafe (die Busse) vor.</p>\n<ul>\n<li>Was machst du, wenn im Zug dein Ticket nicht funktioniert?</li>\n</ul>\n<p>→ Wenn mein Ticket nicht funktioniert, steige ich aus. / ...verstecke ich mich in der Toilette.</p>\n<ul>\n<li>Was machst du, wenn beim Online-Meeting deine Kamera plötzlich angeht und du nur eine Unterhose trägst?</li>\n</ul>\n<p>→ Wenn meine Kamera angeht und ich nur eine Unterhose trage, mache ich einfach weiter.</p>\n<ul>\n<li>Was machst du, wenn du jemanden umarmst, der dir nur die Hand geben wollte?</li>\n</ul>\n<p>→ Wenn ich jemanden umarme, der mir nur die Hand geben wollte, mache ich weiter.</p>\n<ul>\n<li>Was machst du, wenn eine Person mit dir redet, du schon dreimal «Was?» gesagt hast und sie immer noch nicht verstanden hast?</li>\n</ul>\n<p>→ Wenn das passiert, (dann) sage ich selbstbewusst «Ja, genau».</p>\n<ul>\n<li>Was machst du, wenn du aus Versehen im Coop-Self-Checkout einen Artikel nicht bezahlt hast?</li>\n</ul>\n<p>→ Wenn das passiert, gehe ich zurück.</p>\n<ul>\n<li>Was machst du, wenn du mit zwei verschiedenen Schuhen aus dem Haus gehst?</li>\n</ul>\n<p>→ Wenn das passiert, humple ich.</p>\n<ul>\n<li>Wie reagierst du, wenn alle deine Arbeitskollegen eine WhatsApp-Gruppe ohne dich haben?</li>\n</ul>\n<p>→ Wenn das passiert, bekomme ich nicht alle 5 Minuten Nachrichten.</p>\n<ul>\n<li>Was machst du, wenn der Friseur dir den ganzen Kopf abrasiert?</li>\n</ul>\n<p>→ Wenn das passiert, mache ich ein Foto und schicke es meinem Bruder.</p>\n<ul>\n<li>Wenn mir langweilig ist, prokrastiniere ich das Deutschlernen.</li>\n</ul>\n<p><strong>Irreale Bedingungen (Konjunktiv II):</strong></p>\n<ul>\n<li>Wenn ich reich wäre, (dann) würde ich nach Zug ziehen.</li>\n<li>Wenn meine Frau einen teuren BMW hätte, würde ich die ganze Zeit den BMW fahren.</li>\n</ul>\n<hr>\n<h2 id=\"temporal-conjunctions-nebenstze--als-whrend-bevor\">Temporal Conjunctions (Nebensätze) — als, während, bevor</h2>\n<p>Temporal conjunctions are subordinating, so the verb goes to the end of the clause.</p>\n<h3 id=\"1-als-one-time-event-in-the-past\">1. <strong>als</strong> (one-time event in the past)</h3>\n<p>Used for a single, completed action or period in the past (unlike <code>wenn</code>, which is used for present, future, or repeated past events).</p>\n<ul>\n<li><strong>Als</strong> ich in Serbien gewohnt habe~V~, habe~V~ ich studiert.</li>\n<li>Was hast du gemacht, <strong>als</strong> du deinen Finger geschnitten hast~V~?</li>\n</ul>\n<p>→ <strong>Als</strong> ich meinen Finger geschnitten habe~V~, habe~V~ ich mit 3 Messern jongliert.</p>\n<ul>\n<li><strong>Als</strong> ich gelaufen bin~V~, habe~V~ ich 100.- auf der Strasse gefunden.</li>\n<li>Was hast du gemacht, <strong>als</strong> es um 2 Uhr morgens geklingelt hat~V~?</li>\n</ul>\n<p>→ <strong>Als</strong> es um 2 Uhr morgens geklingelt hat~V~, habe~V~ ich vorgegeben, nicht da zu sein.</p>\n<ul>\n<li>Was hast du gemacht, <strong>als</strong> dein Akku leer war~V~?</li>\n</ul>\n<p>→ <strong>Als</strong> mein Akku leer war~V~, habe~V~ ich geweint.</p>\n<ul>\n<li>Was hast du gemacht, <strong>als</strong> dein Freund dich geghostet hat~V~?</li>\n</ul>\n<p>→ <strong>Als</strong> mein Freund mich geghostet hat~V~, habe~V~ ich sein Velo umgestellt/bewegt.</p>\n<h3 id=\"2-whrend-simultaneous-events\">2. <strong>während</strong> (simultaneous events)</h3>\n<p>Used when two actions happen at the exact same time.</p>\n<ul>\n<li><strong>Während</strong> der Löwe die Pflanzen giesst~V~, arbeitet~V~ Superman.</li>\n<li><strong>Während</strong> Transmoneta Geld verliert~V~, feiern~V~ Menschen auf dem Uetliberg.</li>\n<li><strong>Während</strong> der Dieb auf dem Dach chillt~V~, trinkt~V~ ein Mann im Zug ein Bier.</li>\n<li><strong>Während</strong> die Band gespielt hat~V~, ist~V~ ein Löwe einen Käfer gefahren.</li>\n</ul>\n<h3 id=\"3-bevor-action-beforehand\">3. <strong>bevor</strong> (action beforehand)</h3>\n<p>Used to express that the main clause action occurs after the subordinate clause action.</p>\n<ul>\n<li><strong>Bevor</strong> ich am Abend ins Bett gehe~V~, putze~V~ ich meine Zähne.</li>\n<li>Was hast du gemacht, <strong>bevor</strong> du gefrühstückt hast~V~?</li>\n</ul>\n<p>→ <strong>Bevor</strong> ich gefrühstückt habe~V~, habe~V~ ich meine Zähne geputzt / mich angezogen.</p>\n<div class=\"alert alert-note\">Other temporal conjunctions include <strong>seit</strong> (since) and <strong>bis</strong> (until), which also send the verb to the end of the clause.</div>\n<hr>\n<h2 id=\"janein-fragen-vs-w-fragen\">Ja/Nein-Fragen vs. W-Fragen</h2>\n<table>\n<thead>\n<tr>\n<th>Type</th>\n<th>Structure</th>\n<th>Example</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Ja/Nein</td>\n<td>Verb~V1~ Subject ...</td>\n<td>Räumen Sie am Mittwoch auf?</td>\n</tr>\n<tr>\n<td>W-Frage</td>\n<td>W-word Verb~V2~ Subject ...</td>\n<td>Wie lange räumen Sie am Mittwoch auf?</td>\n</tr>\n</tbody>\n</table>"}, {"id": "grammar-12-konjunktiv-ii", "title": "Konjunktiv II", "file": "12-konjunktiv-ii.md", "html": "<h2 id=\"1-wnsche-wishes\">1. Wünsche (Wishes)</h2>\n<p>Expressing wishes about how things <em>could</em> or <em>should</em> be:</p>\n<blockquote>Ich wünschte, es <strong>wäre</strong> kälter.</blockquote>\n<h3 id=\"sein-konjunktiv-ii\">sein (Konjunktiv II)</h3>\n<table>\n<thead>\n<tr>\n<th>Person</th>\n<th>Form</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>ich</td>\n<td>wäre</td>\n</tr>\n<tr>\n<td>du</td>\n<td>wär<strong>est</strong></td>\n</tr>\n<tr>\n<td>er/sie/es</td>\n<td>wäre</td>\n</tr>\n<tr>\n<td>wir</td>\n<td>wären</td>\n</tr>\n<tr>\n<td>ihr</td>\n<td>wär<strong>et</strong></td>\n</tr>\n<tr>\n<td>sie/Sie</td>\n<td>wären</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li>Ich wäre gern zu Hause.</li>\n<li>Was wäre dein Traumjob? → Ich wäre (gern) ein Pilot.</li>\n</ul>\n<h3 id=\"haben-konjunktiv-ii\">haben (Konjunktiv II)</h3>\n<table>\n<thead>\n<tr>\n<th>Person</th>\n<th>Form</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>ich</td>\n<td>hätte</td>\n</tr>\n<tr>\n<td>du</td>\n<td>hättest</td>\n</tr>\n<tr>\n<td>er/sie/es</td>\n<td>hätte</td>\n</tr>\n<tr>\n<td>wir</td>\n<td>hätten</td>\n</tr>\n<tr>\n<td>ihr</td>\n<td>hättet</td>\n</tr>\n<tr>\n<td>sie/Sie</td>\n<td>hätten</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li>Ich hätte gern einen Kaffee.</li>\n</ul>\n<hr>\n<h2 id=\"2-hypothetische-handlungen-wrde--infinitiv\">2. Hypothetische Handlungen: würde + Infinitiv</h2>\n<p><em>Was würdest du machen, wenn ...?</em></p>\n<table>\n<thead>\n<tr>\n<th>Person</th>\n<th>Form</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>ich</td>\n<td>würde</td>\n</tr>\n<tr>\n<td>du</td>\n<td>würdest</td>\n</tr>\n<tr>\n<td>er/sie/es</td>\n<td>würde</td>\n</tr>\n<tr>\n<td>wir</td>\n<td>würden</td>\n</tr>\n<tr>\n<td>ihr</td>\n<td>würdet</td>\n</tr>\n<tr>\n<td>sie/Sie</td>\n<td>würden</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2 id=\"3-irreale-wunschstze-unreal-conditionals\">3. Irreale Wunschsätze (Unreal Conditionals)</h2>\n<p><strong>Structure:</strong> <code>wenn</code> + Konjunktiv II ... , (dann) + <code>würde</code> + Infinitiv</p>\n<table>\n<thead>\n<tr>\n<th></th>\n<th>Example</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Condition</td>\n<td>Wenn ich reich <strong>wäre</strong>,</td>\n</tr>\n<tr>\n<td>Result</td>\n<td>(dann) <strong>würde</strong> ich nach Zug ziehen.</td>\n</tr>\n<tr>\n<td></td>\n<td></td>\n</tr>\n<tr>\n<td>Condition</td>\n<td>Wenn meine Frau einen teuren BMW <strong>hätte</strong>,</td>\n</tr>\n<tr>\n<td>Result</td>\n<td><strong>würde</strong> ich die ganze Zeit den BMW fahren.</td>\n</tr>\n<tr>\n<td></td>\n<td></td>\n</tr>\n<tr>\n<td>Condition</td>\n<td>Wenn meine Lehrerin heute krank <strong>wäre</strong>,</td>\n</tr>\n<tr>\n<td>Result</td>\n<td><strong>würde</strong> ich nach Hause gehen.</td>\n</tr>\n</tbody>\n</table>\n<p><strong>Inverted (result first):</strong></p>\n<ul>\n<li>Ich würde ein Haus kaufen, wenn ich 10 Mio. CHF gewinnen würde.</li>\n</ul>\n<p><strong>Practice questions:</strong></p>\n<ul>\n<li>Was würdest du machen, wenn du 10 Mio. CHF gewinnen würdest?</li>\n<li>Was würdest du machen, wenn du reich wärst?</li>\n</ul>\n<hr>\n<h2 id=\"4-hfliche-bitten-polite-requests--knnen-konjunktiv-ii\">4. Höfliche Bitten (Polite Requests) — können (Konjunktiv II)</h2>\n<table>\n<thead>\n<tr>\n<th>Person</th>\n<th>Form</th>\n<th>Example</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>ich</td>\n<td>könnte</td>\n<td>Könnte ich ein Messer haben?</td>\n</tr>\n<tr>\n<td>du</td>\n<td>könntest</td>\n<td><strong>Könntest</strong> du das Fenster öffnen?</td>\n</tr>\n<tr>\n<td>er/sie</td>\n<td>könnte</td>\n<td><strong>könnte</strong> ≠ konnte (past indicative!)</td>\n</tr>\n<tr>\n<td>wir</td>\n<td>könnten</td>\n<td></td>\n</tr>\n<tr>\n<td>ihr</td>\n<td>könntet</td>\n<td></td>\n</tr>\n<tr>\n<td>Sie</td>\n<td>könnten</td>\n<td>Könnten <strong>Sie</strong> mir Milch bringen?</td>\n</tr>\n</tbody>\n</table>\n<p><strong>Examples:</strong></p>\n<ul>\n<li>Nenad, könntest du das Fenster öffnen?</li>\n<li>Könntest du das Licht anmachen?</li>\n<li>Könnten Sie die Flasche in die Küche bringen?</li>\n</ul>\n<hr>\n<h2 id=\"5-konjunktiv-ii-der-vergangenheit-past-unreal-conditional\">5. Konjunktiv II der Vergangenheit (Past Unreal Conditional)</h2>\n<p>To express unreal conditions or wishes about the <strong>past</strong>, we use the Konjunktiv II forms of <strong>haben</strong> (<em>hätte</em>) or <strong>sein</strong> (<em>wäre</em>) combined with the <strong>Partizip II</strong> (past participle) at the end of the clause.</p>\n<p><strong>Formulas:</strong></p>\n<ul>\n<li>For verbs using <em>haben</em> in the Perfekt: <strong>hätte + Partizip II</strong></li>\n<li>For verbs using <em>sein</em> in the Perfekt: <strong>wäre + Partizip II</strong></li>\n</ul>\n<p><strong>Example:</strong></p>\n<ul>\n<li>Real past situation: <em>Es hat seit Monaten nicht geregnet. Flüsse und Seen sind ausgetrocknet.</em></li>\n<li>Past unreal conditional: <strong>Wenn</strong> es seit Monaten geregnet <strong>hätte</strong>, <strong>wären</strong> Flüsse und Seen nicht <strong>ausgetrocknet</strong>.</li>\n</ul>\n<hr>\n<h2 id=\"6-practice-sentences-irreale-wunschstze\">6. Practice Sentences (Irreale Wunschsätze)</h2>\n<p>Below are transformations from real situations to unreal conditions (present/future and past):</p>\n<ol>\n<li><strong>Johannes ist sehr faul. Er besteht die Prüfung nicht.</strong></li>\n</ol>\n<p>→ <em>Wenn Johannes nicht sehr faul wäre, (dann) würde er die Prüfung bestehen.</em></p>\n<ol>\n<li><strong>Ich bekomme eine Lohnerhöhung. Ich suche mir keinen neuen Job.</strong></li>\n</ol>\n<p>→ <em>Wenn ich keine Lohnerhöhung bekommen würde, würde ich mir einen neuen Job suchen.</em></p>\n<ol>\n<li><strong>Der Schiedsrichter pfeift nicht. Es gibt keinen Elfmeter.</strong></li>\n</ol>\n<p>→ <em>Wenn der Schiedsrichter pfeifen würde, (dann) würde es einen Elfmeter geben.</em></p>\n<ol>\n<li><strong>Heute ist das Wetter sehr schlecht. Ich gehe nicht spazieren.</strong></li>\n</ol>\n<p>→ <em>Wenn das Wetter nicht sehr schlecht wäre, würde ich spazieren gehen.</em></p>\n<ol>\n<li><strong>Der Zug ist mal wieder unpünktlich. Herr Leu kommt zu spät zur Arbeit.</strong></li>\n</ol>\n<p>→ <em>Wenn der Zug pünktlich wäre, würde Herr Leu nicht zu spät zur Arbeit kommen.</em></p>\n<ol>\n<li><strong>Der Autofahrer fährt zu schnell. Er bezahlt eine Geldstrafe.</strong></li>\n</ol>\n<p>→ <em>Wenn der Autofahrer nicht zu schnell fahren würde, würde er keine Geldstrafe bezahlen.</em></p>\n<ol>\n<li><strong>Herr Müller sieht Frau Schmidt nicht. Er grüsst sie nicht.</strong></li>\n</ol>\n<p>→ <em>Wenn Herr Müller Frau Schmidt sehen würde, würde er sie grüssen.</em></p>\n<ol>\n<li><strong>Oliver ist noch sehr klein. Er klettert nicht über die Mauer.</strong></li>\n</ol>\n<p>→ <em>Wenn Oliver nicht sehr klein wäre, würde er über die Mauer klettern.</em></p>\n<ol>\n<li><strong>Hans macht seine Hausaufgaben nicht. Deshalb geht er heute nicht ins Kino.</strong></li>\n</ol>\n<p>→ <em>Wenn Hans seine Hausaufgaben machen würde, würde er heute ins Kino gehen.</em></p>\n<ol>\n<li><strong>Es hat seit Monaten nicht geregnet. Flüsse und Seen sind ausgetrocknet. (Past situation!)</strong></li>\n</ol>\n<p>→ <em>Wenn es seit Monaten geregnet hätte, wären Flüsse und Seen nicht ausgetrocknet.</em></p>"}], "phrases": [{"id": "phrases-planning-and-proposals", "title": "Planning Together (Gemeinsam etwas planen)", "file": "planning-and-proposals.md", "html": "<h2 id=\"making-a-suggestion-einen-vorschlag-machen\">Making a Suggestion (Einen Vorschlag machen)</h2>\n<ul>\n<li>Wie <strong>wäre es</strong>, wenn ...?</li>\n<li>Wir <strong>könnten</strong> ... [Verb].</li>\n<li>Ich <strong>schlage vor</strong>, wir gehen nach Z.</li>\n<li>Ich <strong>würde gern</strong> ...</li>\n<li><strong>Ich denke</strong>, wir könnten ...</li>\n</ul>\n<hr>\n<h2 id=\"accepting-a-suggestion-ratschlag-annehmen-\">Accepting a Suggestion (Ratschlag annehmen ✓)</h2>\n<ul>\n<li>Ja, das ist eine gute Idee!</li>\n<li>Gute Idee!</li>\n<li>Gut, das können wir machen!</li>\n<li>In Ordnung / Okay.</li>\n<li>Das klingt gut.</li>\n</ul>\n<hr>\n<h2 id=\"rejecting--counter-suggestion-ratschlag-ablehnen--gegenvorschlag-\">Rejecting / Counter-Suggestion (Ratschlag ablehnen / Gegenvorschlag ✗)</h2>\n<ul>\n<li>Das ist keine gute Idee.</li>\n<li>Das finde ich nicht so gut.</li>\n<li>Ich möchte lieber ... / Ich würde lieber ...</li>\n<li>Das finde ich nicht so gut. Ich würde lieber ...</li>\n<li>Vielleicht sollten wir lieber ...</li>\n</ul>"}, {"id": "phrases-presentations", "title": "Presentations (Präsentationen)", "file": "presentations.md", "html": "<h2 id=\"opening--thema-nennen\">Opening — Thema nennen</h2>\n<ul>\n<li>Guten Tag. Ich möchte heute über das Thema <strong>...</strong> sprechen.</li>\n<li>Heute möchte ich über das Thema <strong>...</strong> sprechen.</li>\n</ul>\n<hr>\n<h2 id=\"structure--struktur-erklren\">Structure — Struktur erklären</h2>\n<ul>\n<li><strong>Zuerst</strong> möchte ich über die allgemeine Situation sprechen.</li>\n<li><strong>Danach</strong> spreche ich über meine persönlichen Erfahrungen und möchte Beispiele geben.</li>\n<li><strong>Dann</strong> erzähle ich von der Situation in meinem Heimatland.</li>\n<li><strong>Schliesslich</strong> / <strong>Am Ende</strong> spreche ich über die Vor- und Nachteile.</li>\n</ul>\n<p><strong>Signal words for structure:</strong></p>\n<table>\n<thead>\n<tr>\n<th>Connector</th>\n<th>Meaning</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Zuerst</td>\n<td>First</td>\n</tr>\n<tr>\n<td>Danach</td>\n<td>After that</td>\n</tr>\n<tr>\n<td>Dann</td>\n<td>Then</td>\n</tr>\n<tr>\n<td>Schliesslich / Am Ende</td>\n<td>Finally</td>\n</tr>\n<tr>\n<td>besonders</td>\n<td>especially</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2 id=\"content--inhalt\">Content — Inhalt</h2>\n<h3 id=\"heimatland\">Heimatland</h3>\n<ul>\n<li>In meinem Heimatland ...</li>\n<li>Im Vergleich zur Schweiz gibt es in meinem Land ...</li>\n<li>Zum Beispiel gibt es in meinem Heimatland ...</li>\n</ul>\n<h3 id=\"vor--und-nachteile-nennen\">Vor- und Nachteile nennen</h3>\n<ul>\n<li>Ein <strong>Vorteil</strong> von X ist, <strong>dass</strong> ...</li>\n<li>Ein <strong>Nachteil</strong> von X ist, <strong>dass</strong> ...</li>\n</ul>\n<h3 id=\"eigene-meinung-sagen\">Eigene Meinung sagen</h3>\n<ul>\n<li>Ich glaube, <strong>dass</strong> ... <em>(Verb at end!)</em></li>\n<li>Meiner Meinung nach ist ...</li>\n</ul>\n<hr>\n<h2 id=\"closing--prsentation-beenden\">Closing — Präsentation beenden</h2>\n<ul>\n<li>Zum Schluss möchte ich sagen, ...</li>\n<li>Schliesslich möchte ich sagen, ...</li>\n<li>Ich bedanke mich für Ihre Aufmerksamkeit.</li>\n<li><strong>Danke für Ihre Aufmerksamkeit!</strong></li>\n<li>Haben Sie Fragen?</li>\n<li>Gibt es Fragen?</li>\n</ul>\n<hr>\n<h2 id=\"presentation-flow\">Presentation Flow</h2>\n<pre><code class=\"language-\">THEMA     → Guten Tag. Ich möchte heute über das Thema ... sprechen.\n\nSTRUKTUR  → Zuerst spreche ich über...\n             Danach ... erzähle ich von\n             Dann...\n             Schliesslich / Am Ende...\n\nINHALT    → Persönliche Situation\n             Heimatland → In meinem Heimatland gibt es\n             Vorteile + Nachteile\n             Meinung\n\nENDE      → Zum Schluss | Schliesslich\n             Danke für Ihre Aufmerksamkeit!</code></pre>"}, {"id": "phrases-restaurant-complaints", "title": "Restaurant Complaints (Im Restaurant reklamieren)", "file": "restaurant-complaints.md", "html": "<h2 id=\"situations\">Situations</h2>\n<table>\n<thead>\n<tr>\n<th>Situation</th>\n<th>Asking (W-Frage)</th>\n<th>Asking (Ja/Nein-Frage)</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Haar im Essen</td>\n<td>Darf ich fragen, <strong>warum</strong> ein Haar in meinem Essen ist?</td>\n<td>Kann ich einen neuen Teller haben?</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2 id=\"indirect-questions-indirekte-fragen-in-restaurant-context\">Indirect Questions (Indirekte Fragen) in Restaurant Context</h2>\n<p>Use <code>Darf ich fragen, ...</code> / <code>Können Sie mir sagen, ...</code> / <code>Ich möchte wissen, ...</code></p>\n<ul>\n<li>Darf ich fragen, <strong>warum</strong> ein Haar in meinem Essen ist?</li>\n<li>Können Sie mir sagen, <strong>ob</strong> ich einen neuen Teller haben kann?</li>\n<li>Ich möchte wissen, <strong>wer</strong> diesen Teller gemacht hat.</li>\n<li>... <strong>wo</strong> die Toilette ist.</li>\n<li>... <strong>wo</strong> ich reklamieren kann.</li>\n<li>... <strong>was</strong> das in meinem Teller ist? <em>(Wo? → in + Dat.)</em></li>\n<li>... <strong>wann</strong> ich einen neuen Teller bekomme?</li>\n<li>... <strong>wie viel Uhr</strong> es ist?</li>\n<li>... <strong>wohin</strong> ich für die Reklamation gehen kann?</li>\n<li>... <strong>woher</strong> das Haar kommt?</li>\n</ul>\n<hr>\n<h2 id=\"key-phrases\">Key Phrases</h2>\n<ul>\n<li>Kann ich einen neuen Teller haben?</li>\n<li>Ich möchte reklamieren.</li>\n<li>Entschuldigung, aber...</li>\n<li>Das schmeckt nicht gut.</li>\n<li>Das ist nicht was ich bestellt habe.</li>\n</ul>"}, {"id": "phrases-sequencing-connectors", "title": "Sequencing Connectors (Zeitliche Reihenfolge)", "file": "sequencing-connectors.md", "html": "<p>Used to describe the <strong>order of actions</strong> or events.</p>\n<h2 id=\"connectors\">Connectors</h2>\n<table>\n<thead>\n<tr>\n<th>German</th>\n<th>Meaning</th>\n<th>Notes</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>Zuerst</strong></td>\n<td>First of all</td>\n<td></td>\n</tr>\n<tr>\n<td><strong>Dann</strong></td>\n<td>Then</td>\n<td>triggers inversion (P1)</td>\n</tr>\n<tr>\n<td><strong>Danach</strong></td>\n<td>After that</td>\n<td>triggers inversion (P1)</td>\n</tr>\n<tr>\n<td><strong>Anschliessend</strong></td>\n<td>Subsequently</td>\n<td></td>\n</tr>\n<tr>\n<td><strong>Im Anschluss</strong></td>\n<td>Following that</td>\n<td></td>\n</tr>\n<tr>\n<td><strong>Am Ende</strong></td>\n<td>At the end (of an action)</td>\n<td></td>\n</tr>\n<tr>\n<td><strong>Schlussendlich</strong></td>\n<td>Finally / Eventually</td>\n<td></td>\n</tr>\n<tr>\n<td><strong>Schliesslich</strong></td>\n<td>Finally</td>\n<td>also used in presentations</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2 id=\"example-morning-routine\">Example: Morning Routine</h2>\n<ul>\n<li><strong>Zuerst</strong> wachst du auf.</li>\n<li><strong>Dann</strong> frühstückst du.</li>\n<li><strong>Danach</strong> räumst du den Tisch ab.</li>\n<li><strong>Anschliessend</strong> wäschst du ab.</li>\n<li><strong>Im Anschluss</strong> trocknest du ab.</li>\n<li><strong>Dann</strong> duschst du.</li>\n<li><strong>Danach</strong> ziehst du dich an.</li>\n<li><strong>Am Ende</strong> (vom Tag) ziehst du dich aus.</li>\n<li><strong>Schlussendlich</strong> schläfst du ein.</li>\n</ul>\n<hr>\n<h2 id=\"word-order-note\">Word Order Note</h2>\n<p>When <code>dann</code> / <code>danach</code> appear at the beginning, the verb comes next (inversion):</p>\n<pre><code class=\"language-\">danach  räumst  du...      ✓\ndanach  du räumst...       ✗\n\n...und (du) räumst...      ✓  (with \"und\", no inversion)</code></pre>"}], "vocabulary": [{"id": "vocabulary-bekleidung", "title": "Vokabular: Bekleidung", "file": "bekleidung.md", "html": "<p>Topic-based vocabulary list for clothes, materials, accessories, colors, and fit.</p>\n<table>\n<thead>\n<tr>\n<th>Clothing Items (Kleidung)</th>\n<th>Materials & Accessories (Material & Schmuck)</th>\n<th>Verbs & Fit (Verben & Passform)</th>\n<th>Colors & Patterns (Farben & Muster)</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>die Kleider (pl.)</td>\n<td>der Stoff</td>\n<td>anziehen</td>\n<td>die Farbe</td>\n</tr>\n<tr>\n<td>die Mode / modisch</td>\n<td>das Leder</td>\n<td>ausziehen</td>\n<td>hell- / dunkel-</td>\n</tr>\n<tr>\n<td>das Nachthemd</td>\n<td>die Wolle</td>\n<td>sich umziehen</td>\n<td>einfarbig / farbig / bunt</td>\n</tr>\n<tr>\n<td>der Schlafanzug</td>\n<td>der Knopf</td>\n<td>anprobieren</td>\n<td>blau / braun / gelb / grau</td>\n</tr>\n<tr>\n<td>die Unterwäsche / Unterhose</td>\n<td>der Schirm</td>\n<td>jemandem passen</td>\n<td>grün / lila / orange / rosa</td>\n</tr>\n<tr>\n<td>der Slip</td>\n<td>der Schmuck</td>\n<td>passen zu etwas</td>\n<td>rot / schwarz / violett / weiss</td>\n</tr>\n<tr>\n<td>der Büstenhalter (BH)</td>\n<td>die Halskette</td>\n<td>jemandem stehen</td>\n<td>eng / weit</td>\n</tr>\n<tr>\n<td>das Unterhemd</td>\n<td>die Armbanduhr</td>\n<td>tragen / anhaben</td>\n<td>gestreift</td>\n</tr>\n<tr>\n<td>die Socken / Strümpfe</td>\n<td>das Armband</td>\n<td>bequem / unbequem</td>\n<td>gepunktet</td>\n</tr>\n<tr>\n<td>die Strumpfhosen</td>\n<td>der Ring</td>\n<td>schick / elegant</td>\n<td>kariert</td>\n</tr>\n<tr>\n<td>die Hose / Jeans</td>\n<td>die Ohrenringe (pl.)</td>\n<td>alt / neu</td>\n<td></td>\n</tr>\n<tr>\n<td>das Hemd / T-Shirt / Bluse</td>\n<td>das Gold / Silber</td>\n<td></td>\n<td></td>\n</tr>\n<tr>\n<td>der Pullover</td>\n<td></td>\n<td></td>\n<td></td>\n</tr>\n<tr>\n<td>die Jacke / der Mantel</td>\n<td></td>\n<td></td>\n<td></td>\n</tr>\n<tr>\n<td>der Regenmantel</td>\n<td></td>\n<td></td>\n<td></td>\n</tr>\n<tr>\n<td>der Rock / das Kleid</td>\n<td></td>\n<td></td>\n<td></td>\n</tr>\n<tr>\n<td>der Anzug / Hosenanzug</td>\n<td></td>\n<td></td>\n<td></td>\n</tr>\n<tr>\n<td>das Kostüm</td>\n<td></td>\n<td></td>\n<td></td>\n</tr>\n<tr>\n<td>der Gürtel / die Krawatte</td>\n<td></td>\n<td></td>\n<td></td>\n</tr>\n<tr>\n<td>die Schuhe / Turnschuhe (pl.)</td>\n<td></td>\n<td></td>\n<td></td>\n</tr>\n<tr>\n<td>die Sandalen / Stiefel (pl.)</td>\n<td></td>\n<td></td>\n<td></td>\n</tr>\n<tr>\n<td>der Schal / das Halstuch</td>\n<td></td>\n<td></td>\n<td></td>\n</tr>\n<tr>\n<td>die Handschuhe (pl.)</td>\n<td></td>\n<td></td>\n<td></td>\n</tr>\n<tr>\n<td>der Hut / die Mütze</td>\n<td></td>\n<td></td>\n<td></td>\n</tr>\n<tr>\n<td>die Badehose / der Badeanzug</td>\n<td></td>\n<td></td>\n<td></td>\n</tr>\n<tr>\n<td>das Bikini / die Tasche</td>\n<td></td>\n<td></td>\n<td></td>\n</tr>\n<tr>\n<td>die Handtasche</td>\n<td></td>\n<td></td>\n<td></td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3 id=\"key-expressions--examples\">Key Expressions & Examples</h3>\n<ul>\n<li><strong>die Umkleidekabine</strong> = the changing room</li>\n<li><strong>die Grösse</strong> = size</li>\n<li><strong> >Ich bin langweilig.</strong> = I am boring. <em>(Crucial distinction!)</em></li>\n<li><strong>etwas macht Spass</strong> = something is fun</li>\n<li><strong>Vor 2 Wochen</strong> = two weeks ago</li>\n<li><strong>ausser</strong> (+ Dat.) = except (e.g., <em>Ich esse alles ausser Pilze. Ich mag sie nicht.</em>)</li>\n<li><strong>Es kommt darauf an.</strong> = It depends.</li>\n</ul>"}, {"id": "vocabulary-moebel-deko", "title": "Vokabular: Möbel & Deko", "file": "moebel-deko.md", "html": "<p>Topic-based vocabulary list for furniture, decor, appliances, heating, electricity, and housework.</p>\n<table>\n<thead>\n<tr>\n<th>Furniture & Decor (Möbel & Deko)</th>\n<th>Appliances & Utilities (Haushaltsgeräte)</th>\n<th>Household & Housework (Haushalt)</th>\n<th>Adjectives describing Furniture/Homes</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>die Einrichtung / einrichten</td>\n<td>der Fernseher</td>\n<td>der Haushalt</td>\n<td>alt / neu</td>\n</tr>\n<tr>\n<td>die Möbel (pl.) / das Möbelstück</td>\n<td>die Stereoanlage</td>\n<td>kochen / braten / backen</td>\n<td>altmodisch / modern</td>\n</tr>\n<tr>\n<td>das Bett / die Decke / das Kissen</td>\n<td>der Kühlschrank</td>\n<td>das Geschirr</td>\n<td>billig / teuer</td>\n</tr>\n<tr>\n<td>der Schrank / der Kasten (CH)</td>\n<td>der Kochherd / der Backofen</td>\n<td>spülen / abwaschen / abtrocknen</td>\n<td>bunt / farbig / einfarbig</td>\n</tr>\n<tr>\n<td>der Tisch / der Esstisch</td>\n<td>die Kaffeemaschine</td>\n<td>das Geschirrtuch</td>\n<td>dunkel / hell</td>\n</tr>\n<tr>\n<td>der Schreibtisch / das Pult</td>\n<td>der Geschirrspüler</td>\n<td>das Gerät / das Elektrogerät</td>\n<td>eckig / rund</td>\n</tr>\n<tr>\n<td>die Tischdecke</td>\n<td>die Badewanne / die Dusche</td>\n<td>der Eimer / der Putzeimer</td>\n<td>bequem / unbequem (e.g. Sofa)</td>\n</tr>\n<tr>\n<td>der Stuhl / der Sessel</td>\n<td>das Waschbecken</td>\n<td>(staub)saugen / der Staubsauger</td>\n<td>gemütlich / ungemütlich</td>\n</tr>\n<tr>\n<td>der Sofa / die Cou >\n</tr>\n<tr>\n<td>die Staatsangehörigkeit</td>\n<td>einen Bart tragen</td>\n<td>ruhig / nervös / lebhaft</td>\n</tr>\n<tr>\n<td>die Heimat</td>\n<td>eine Brille tragen</td>\n<td>sportlich / unsportlich</td>\n</tr>\n<tr>\n<td>der Ausweis / der Pass</td>\n<td>Humor haben</td>\n<td>neugierig / komisch</td>\n</tr>\n<tr>\n<td>das Visum</td>\n<td>geboren sein in/am</td>\n<td>langweilig / lustig / fröhlich</td>\n</tr>\n<tr>\n<td>die Anmeldung</td>\n<td>verheiratet sein</td>\n<td>intelligent / dumm / doof / blöd</td>\n</tr>\n<tr>\n<td>die Abmeldung</td>\n<td>geschieden sein</td>\n<td>faul / fleissig</td>\n</tr>\n<tr>\n<td>die Personalien</td>\n<td>getrennt leben von</td>\n<td>ängstlich / mutig</td>\n</tr>\n<tr>\n<td>der Herr / die Frau</td>\n<td></td>\n<td>aktiv / passiv</td>\n</tr>\n<tr>\n<td>die Adresse / der Wohnort</td>\n<td></td>\n<td>gut gelaunt sein</td>\n</tr>\n<tr>\n<td>die Strasse / der Weg</td>\n<td></td>\n<td>schlecht gelaunt sein</td>\n</tr>\n<tr>\n<td>der Platz</td>\n<td></td>\n<td>(un)zufrieden (mit)</td>\n</tr>\n<tr>\n<td>die Nummer / Hausnummer</td>\n<td></td>\n<td>(un)glücklich</td>\n</tr>\n<tr>\n<td>die Postleitzahl (PLZ)</td>\n<td></td>\n<td>(un)romantisch</td>\n</tr>\n<tr>\n<td>der Familienstand (D) / Zivilstand (CH)</td>\n<td></td>\n<td>ernst / traurig</td>\n</tr>\n<tr>\n<td>das Geschlecht (männlich/weiblich)</td>\n<td></td>\n<td>stolz / geduldig</td>\n</tr>\n<tr>\n<td>das Datum / Geburtsdatum</td>\n<td></td>\n<td>nett / freundlich / unfreundlich</td>\n</tr>\n<tr>\n<td>der Geburtstag / das Geburtsjahr</td>\n<td></td>\n<td>frech / sympathisch / unsympathisch</td>\n</tr>\n<tr>\n<td>der Geburtsort</td>\n<td></td>\n<td>höflich / unhöflich</td>\n</tr>\n<tr>\n<td>das Alter</td>\n<td></td>\n<td>treu / untreu</td>\n</tr>\n<tr>\n<td>die Visitenkarte</td>\n<td></td>\n<td>ehrlich / unehrlich</td>\n</tr>\n<tr>\n<td>das Aussehen / die Figur</td>\n<td></td>\n<td>blass</td>\n</tr>\n<tr>\n<td>das Gesicht / der Charakter</td>\n<td></td>\n<td></td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3 id=\"key-expressions--examples\">Key Expressions & Examples</h3>\n<ul>\n<li><strong>Sie ist Anfang/Ende vierzig.</strong> = She is in her early/late forties.</li>\n<li><strong>getrennt leben von</strong> = to live separated from</li>\n<li><strong>allein erziehend</strong> = single parent</li>\n</ul>"}, {"id": "vocabulary-wohnen-mieten", "title": "Vokabular: Wohnen & Mieten", "file": "wohnen-mieten.md", "html": "<p>Topic-based vocabulary list for houses, apartments, renting, rooms, and building parts.</p>\n<table>\n<thead>\n<tr>\n<th>Housing & Renting (Wohnen & Mieten)</th>\n<th>Rooms & Building Parts (Räume & Gebäudeteile)</th>\n<th>Actions (Aktivitäten & Verben)</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>wohnen</td>\n<td>das Untergeschoss (UG)</td>\n<td>ausziehen (move out)</td>\n</tr>\n<tr>\n<td>die Wohnung</td>\n<td>das Erdgeschoss (EG)</td>\n<td>einziehen (move in)</td>\n</tr>\n<tr>\n<td>das Haus / das Gebäude</td>\n<td>das Obergeschoss (OG)</td>\n<td>umziehen (move/relocate)</td>\n</tr>\n<tr>\n<td>das Einfamilienhaus</td>\n<td>der Raum / das Zimmer</td>\n<td>bauen / kaufen / verkaufen</td>\n</tr>\n<tr>\n<td>das Mehrfamilienhaus</td>\n<td>das Wohnzimmer / Schlafzimmer</td>\n<td>kündigen (terminate/quit)</td>\n</tr>\n<tr>\n<td>die Eigentumswohnung</td>\n<td>das Kinderzimmer / Arbeitszimmer</td>\n<td>klingeln</td>\n</tr>\n<tr>\n<td>die 3-Zimmerwohnung</td>\n<td>das Gästezimmer</td>\n<td>aufmachen / aufschliessen</td>\n</tr>\n<tr>\n<td>die WG (Wohngemeinschaft)</td>\n<td>das Bad / das Badezimmer</td>\n<td>zumachen / schliessen / abschliessen</td>\n</tr>\n<tr>\n<td>das Studentenwohnheim</td>\n<td>die Toilette / das WC / die Küche</td>\n<td>stecken (in)</td>\n</tr>\n<tr>\n<td>das Hochhaus</td>\n<td>der Gang / der Flur / der Korridor</td>\n<td></td>\n</tr>\n<tr>\n<td>der Nachbar</td>\n<td>die Tür / das Schloss / das Türschloss</td>\n<td></td>\n</tr>\n<tr>\n<td>die Miete / die Nebenkosten</td>\n<td>das Fenster / die Wand / die Mauer</td>\n<td></td>\n</tr>\n<tr>\n<td>der/die Mieter/-in</td>\n<td>der Boden / die Decke / das Dach</td>\n<td></td>\n</tr>\n<tr>\n<td>der/die Vermieter/-in</td>\n<td>die Treppe / die Stiege / die Stufe</td>\n<td></td>\n</tr>\n<tr>\n<td>der/die Hausmeister/in</td>\n<td>der Aufzug / der Lift / das Treppenhaus</td>\n<td></td>\n</tr>\n<tr>\n<td>der/die Abwart/in (CH)</td>\n<td>der Stock / das Stockwerk</td>\n<td></td>\n</tr>\n<tr>\n<td>der Mietvertrag</td>\n<td>der Keller / das Kellerabteil</td>\n<td></td>\n</tr>\n<tr>\n<td>die Kaution</td>\n<td>die Waschküche / die Waschmaschine</td>\n<td></td>\n</tr>\n<tr>\n<td>die Kündigung</td>\n<td>der Estrich / der Dachboden</td>\n<td></td>\n</tr>\n<tr>\n<td></td>\n<td>der Kamin / der Ofen</td>\n<td></td>\n</tr>\n<tr>\n<td></td>\n<td>der Balkon / die Terrasse</td>\n<td></td>\n</tr>\n<tr>\n<td></td>\n<td>der Hof / der Garten / die Garage / die Ausfahrt</td>\n<td></td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h3 id=\"key-locations--measurements\">Key Locations & Measurements</h3>\n<ul>\n<li><strong>das Stadtzentrum</strong> = city center</li>\n<li><strong>die Vorstadt</strong> = suburbs</li>\n<li><strong>der Stadtrand</strong> = outskirts</li>\n<li><strong>eine Wohnung in der Stadt</strong> = an apartment in the city</li>\n<li><strong>eine Wohnung auf dem Land</strong> = an apartment in the country</li>\n<li><strong>die Fläche</strong> = surface area / space</li>\n<li><strong>der Quadratmeter (m²)</strong> = square meter</li>\n<li><strong>inklusiv (inkl.)</strong> = inclusive (e.g. rent including utility costs)</li>\n</ul>"}], "exam": [{"id": "exam-goethe-b1-solutions", "title": "Goethe B1 — Test Solutions (Lösungen)", "file": "goethe-b1-solutions.md", "html": "<h2 id=\"test-1\">Test 1</h2>\n<h3 id=\"lesen-1\">Lesen 1</h3>\n<p>1 richtig, 2 falsch, 3 richtig, 4 richtig, 5 richtig, 6 falsch</p>\n<h3 id=\"lesen-2\">Lesen 2</h3>\n<p>7c, 8c, 9a, 10b, 11a, 12a</p>\n<h3 id=\"lesen-3\">Lesen 3</h3>\n<p>13c, 14a, 15j, 16 x, 17e, 18f, 19d</p>\n<h3 id=\"lesen-4\">Lesen 4</h3>\n<p>20 nein, 21 ja, 22 ja, 23 nein, 24 ja, 25 nein, 26 nein</p>\n<h3 id=\"lesen-5\">Lesen 5</h3>\n<p>27c, 28b, 29c, 30b</p>\n<h3 id=\"hren-1\">Hören 1</h3>\n<p>1 falsch, 2b, 3 richtig, 4c, 5 falsch, 6a, 7 richtig, 8a, 9 richtig, 10c</p>\n<h3 id=\"hren-2\">Hören 2</h3>\n<p>11b, 12b, 13c, 14c, 15c</p>\n<h3 id=\"hren-3\">Hören 3</h3>\n<p>16 richtig, 17 falsch, 18 falsch, 19 richtig, 20 falsch, 21 falsch, 22 richtig</p>\n<h3 id=\"hren-4\">Hören 4</h3>\n<p>23a, 24a, 25b, 26c, 27b, 28c, 29c, 30b</p>\n<hr>\n<blockquote>Source: Goethe B1 Tests 1–4 (Intensivkurs Nenad)</blockquote>"}]};
        
        // State variables
        let activeSectionId = "grammar-01-verb-conjugation";
        let highlightActive = false;
        let searchQuery = "";
        
        // Category friendly names
        const categoryNames = {
            "grammar": "📖 Grammatik",
            "phrases": "🗣 Redemittel (Phrases)",
            "vocabulary": "🗂 Vokabular (Vocabulary)",
            "exam": "📝 Goethe B1 Prüfung"
        };
        
        // Theme control
        function initTheme() {
            const storedTheme = localStorage.getItem("theme") || "dark";
            document.documentElement.setAttribute("data-theme", storedTheme);
        }
        
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute("data-theme");
            const newTheme = currentTheme === "dark" ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", newTheme);
            localStorage.setItem("theme", newTheme);
        }
        
        // Sidebar drawer toggle on mobile
        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            sidebar.classList.toggle("open");
        }
        
        // Close sidebar if user clicks main area on mobile
        document.querySelector(".main").addEventListener("click", () => {
            const sidebar = document.getElementById("sidebar");
            if (sidebar.classList.contains("open")) {
                sidebar.classList.remove("open");
            }
        });
        
        // Render sidebar items
        function renderSidebar() {
            const sidebarMenu = document.getElementById("sidebarMenu");
            sidebarMenu.innerHTML = "";
            
            for (const [catKey, catItems] of Object.entries(appData)) {
                // Filter items based on search query
                const filteredItems = catItems.filter(item => {
                    if (!searchQuery) return true;
                    // Check matches in title or content
                    const query = searchQuery.toLowerCase();
                    return item.title.toLowerCase().includes(query) || 
                           item.html.toLowerCase().includes(query);
                });
                
                if (filteredItems.length === 0) continue;
                
                const catDiv = document.createElement("div");
                catDiv.className = "menu-category";
                
                const titleDiv = document.createElement("div");
                titleDiv.className = "category-title";
                titleDiv.innerText = categoryNames[catKey] || catKey;
                catDiv.appendChild(titleDiv);
                
                const list = document.createElement("ul");
                list.className = "menu-list";
                
                filteredItems.forEach(item => {
                    const listItem = document.createElement("li");
                    listItem.className = "menu-item";
                    
                    const link = document.createElement("a");
                    link.className = `menu-link ${item.id === activeSectionId ? 'active' : ''}`;
                    link.innerText = item.title;
                    link.onclick = () => {
                        scrollToSection(item.id);
                        // Close sidebar on mobile
                        document.getElementById("sidebar").classList.remove("open");
                    };
                    
                    listItem.appendChild(link);
                    list.appendChild(listItem);
                });
                
                catDiv.appendChild(list);
                sidebarMenu.appendChild(catDiv);
            }
        }

        function getAllItems() {
            return Object.values(appData).flat();
        }

        function findItem(sectionId) {
            return getAllItems().find(item => item.id === sectionId);
        }

        function updateActiveSection(sectionId, updateHash = true) {
            const activeItem = findItem(sectionId);
            if (!activeItem || activeSectionId === sectionId) {
                if (activeItem) {
                    document.getElementById("headerTitle").innerText = activeItem.title;
                }
                return;
            }

            activeSectionId = sectionId;
            document.getElementById("headerTitle").innerText = activeItem.title;
            renderSidebar();

            if (updateHash) {
                window.history.replaceState(null, null, `#${sectionId}`);
            }
        }

        function renderAllContent() {
            const contentCard = document.getElementById("contentCard");
            contentCard.innerHTML = getAllItems().map(item => `
                <section class="note-section" id="${item.id}">
                    <h1>${item.title}</h1>
                    ${item.html}
                </section>
            `).join("");

            contentCard.classList.toggle("hl-active", highlightActive);
            if (highlightActive) {
                applyGrammarHighlighting(contentCard);
            }

            if (searchQuery) {
                applySearchHighlighting(contentCard, searchQuery);
            }
        }

        function scrollToSection(sectionId) {
            const section = document.getElementById(sectionId);
            if (!section) return;

            updateActiveSection(sectionId);
            section.scrollIntoView({ behavior: "smooth", block: "start" });
        }

        function syncActiveSectionFromScroll() {
            const contentArea = document.querySelector(".content-area");
            const areaTop = contentArea.getBoundingClientRect().top;
            const sections = [...document.querySelectorAll(".note-section")];
            let currentSectionId = activeSectionId;

            for (const section of sections) {
                const sectionTop = section.getBoundingClientRect().top - areaTop;
                if (sectionTop <= 80) {
                    currentSectionId = section.id;
                } else {
                    break;
                }
            }

            updateActiveSection(currentSectionId);
        }
        
        // Highlight Switch
        function toggleHighlight() {
            const toggle = document.getElementById("highlightToggle");
            highlightActive = toggle.checked;

            renderAllContent();
            const section = document.getElementById(activeSectionId);
            if (section) section.scrollIntoView({ block: "start" });
        }
        
        // GRAMMAR HIGHLIGHTING ENGINE (DOM-safe parser)
        function applyGrammarHighlighting(container) {
            // We walk text nodes recursively
            const walker = document.createTreeWalker(
                container,
                NodeFilter.SHOW_TEXT,
                {
                    acceptNode: function(node) {
                        // Do not highlight inside <code>, <pre>, or <a> links containing URLs
                        let parent = node.parentNode;
                        while (parent && parent !== container) {
                            if (parent.tagName === 'CODE' || parent.tagName === 'PRE') {
                                return NodeFilter.FILTER_REJECT;
                            }
                            parent = parent.parentNode;
                        }
                        return NodeFilter.FILTER_ACCEPT;
                    }
                },
                false
            );
            
            const textNodes = [];
            while (walker.nextNode()) {
                textNodes.push(walker.currentNode);
            }
            
            textNodes.forEach(node => {
                let text = node.nodeValue;
                let hasReplacements = false;
                
                // 1. Dative / Accusative Phrases (common ones in notes)
                // Let's identify the exact phrases we want to highlight in sentences
                const datPhrases = [
                    "in einer WG", "am Stadtrand", "mit meinem grossen Bruder", 
                    "im Büro", "im Tram", "im Krankenhaus", "im Kino", "im Bett", "im Bus",
                    "in der Migros", "in der Apotheke", "in der Bar", "in der Schweiz", "in der Kita",
                    "bei der Arbeit", "bei Freunden", "beim Arzt", "bei den Eltern", "zu Hause"
                ];
                
                const akkPhrases = [
                    "in die Küche", "auf den Tisch", "ins Büro", "ins Krankenhaus", "ins Kino",
                    "ins Bett", "in die Bar", "in die Schweiz", "in die Kita", "in die Apotheke",
                    "in den Coop", "in die Migros", "in die Schule", "an den Match", "an den See",
                    "an die Bar", "über dem Bett", "unter den Tisch", "hinter das Haus", "zwischen die Stühle"
                ];
                
                // Escape regex helper
                const escapeReg = s => s.replace(/[-\/\\^$*+?.()|[\]]/g, '\\$&');
                
                // Conjugated verbs list (common in notes)
                const verbsList = [
                    "habe", "hat", "haben", "hatte", "hätte", "hätten", "geholfen",
                    "bin", "ist", "sind", "war", "waren", "wäre", "wären", "ausgetrocknet",
                    "würde", "würden", "könnte", "könnten", "muss", "müssen", "soll",
                    "sollen", "will", "wollen", "darf", "dürfen", "kann", "können", "mag", "mögen",
                    "gefrühstückt", "umgezogen", "gewohnt", "geschnitten", "geklingelt", "geghostet",
                    "gesessen", "gerochen", "schlagen", "geschlagen", "prokrastiniere", "prokrastiniert",
                    "vorgegeben", "entscheiden", "erholen", "sammeln", "aufpassen", "begrüssen", "grüssen",
                    "klettern", "pfeifen", "gepfiffen", "rasieren", "bestellen", "vertrauen", "gehören"
                ];
                
                // Subordinating Conjunctions
                const conjsList = ["weil", "dass", "wenn", "ob", "als", "während", "bevor", "seit", "bis"];
                
                // Let's tokenise or replace patterns step-by-step using HTML markers
                // We'll replace matching phrases with special placeholder tags to avoid nested replacements
                let tempText = text;
                
                // Highlight Prepositional Phrases
                datPhrases.forEach((phrase, idx) => {
                    const reg = new RegExp(`\\b${escapeReg(phrase)}\\b`, 'gi');
                    if (reg.test(tempText)) {
                        tempText = tempText.replace(reg, m => `__DAT__${m}__END_DAT__`);
                        hasReplacements = true;
                    }
                });
                
                akkPhrases.forEach((phrase, idx) => {
                    const reg = new RegExp(`\\b${escapeReg(phrase)}\\b`, 'gi');
                    if (reg.test(tempText)) {
                        tempText = tempText.replace(reg, m => `__AKK__${m}__END_AKK__`);
                        hasReplacements = true;
                    }
                });
                
                // Highlight Nouns (der/die/das/die pl.)
                // Match "der / die / das / die (pl.) / die [CapitalizedWord]"
                const nounReg = /\b(der|die|das)\s+([A-ZÄÖÜ][a-zäöüßé\-\/]*)/g;
                if (nounReg.test(tempText)) {
                    tempText = tempText.replace(nounReg, (m, art, noun) => {
                        let lowerArt = art.toLowerCase();
                        if (lowerArt === 'der') {
                            return `<span class="hl-masc">der ${noun}</span>`;
                        } else if (lowerArt === 'das') {
                            return `<span class="hl-neut">das ${noun}</span>`;
                        } else if (lowerArt === 'die') {
                            // Check if plural in context (e.g. parents, children, etc. or followed by plural mark)
                            const isPlural = /\b(Möbel|Eltern|Geschwister|Freunde|Kinder|Bücher|Schuhe|Kleider|Socken|Strümpfe|Stiefel|Handschuhe|Kräuter)\b/i.test(noun) || m.includes('(pl.)');
                            if (isPlural) {
                                return `<span class="hl-plur">die ${noun}</span>`;
                            } else {
                                return `<span class="hl-fem">die ${noun}</span>`;
                            }
                        }
                        return m;
                    });
                    hasReplacements = true;
                }
                
                // Highlight Conjunctions
                conjsList.forEach(conj => {
                    const reg = new RegExp(`\\b(${conj})\\b`, 'gi');
                    if (reg.test(tempText)) {
                        tempText = tempText.replace(reg, `<span class="hl-conj">$1</span>`);
                        hasReplacements = true;
                    }
                });
                
                // Highlight Verbs
                verbsList.forEach(verb => {
                    const reg = new RegExp(`\\b(${escapeReg(verb)})\\b`, 'gi');
                    if (reg.test(tempText)) {
                        tempText = tempText.replace(reg, `<span class="hl-verb">$1</span>`);
                        hasReplacements = true;
                    }
                });
                
                // Resolve placeholders
                if (hasReplacements) {
                    tempText = tempText
                        .replace(/__DAT__/g, '<span class="hl-dat">')
                        .replace(/__END_DAT__/g, '</span>')
                        .replace(/__AKK__/g, '<span class="hl-akk">')
                        .replace(/__END_AKK__/g, '</span>');
                        
                    // Replace the text node with HTML elements
                    const spanEl = document.createElement("span");
                    spanEl.innerHTML = tempText;
                    node.parentNode.replaceChild(spanEl, node);
                }
            });
        }
        
        // SEARCH ENGINE - highlights query match
        function handleSearch() {
            const searchInput = document.getElementById("searchInput");
            searchQuery = searchInput.value.trim();
            
            // Re-render sidebar filtering
            renderSidebar();
            
            // Re-render full document to apply or clear search term highlighting
            renderAllContent();
            const section = document.getElementById(activeSectionId);
            if (section) section.scrollIntoView({ block: "start" });
        }
        
        function applySearchHighlighting(container, query) {
            if (!query) return;
            
            const regex = new RegExp(`(${query.replace(/[-\/\\^$*+?.()|[\]]/g, '\\$&')})`, 'gi');
            
            const walker = document.createTreeWalker(
                container,
                NodeFilter.SHOW_TEXT,
                {
                    acceptNode: function(node) {
                        let parent = node.parentNode;
                        while (parent && parent !== container) {
                            if (parent.tagName === 'CODE' || parent.tagName === 'PRE' || parent.classList.contains('search-highlight')) {
                                return NodeFilter.FILTER_REJECT;
                            }
                            parent = parent.parentNode;
                        }
                        return NodeFilter.FILTER_ACCEPT;
                    }
                },
                false
            );
            
            const textNodes = [];
            while (walker.nextNode()) {
                textNodes.push(walker.currentNode);
            }
            
            textNodes.forEach(node => {
                const text = node.nodeValue;
                if (regex.test(text)) {
                    const span = document.createElement("span");
                    span.innerHTML = text.replace(regex, '<span class="search-highlight">$1</span>');
                    node.parentNode.replaceChild(span, node);
                }
            });
        }
        
        // Initial Startup
        window.onload = () => {
            initTheme();
            
            // Read hash from URL to load initial section
            const hash = window.location.hash.substring(1);
            if (hash && findItem(hash)) {
                activeSectionId = hash;
            }
            
            renderSidebar();
            renderAllContent();
            updateActiveSection(activeSectionId, false);

            const contentArea = document.querySelector(".content-area");
            contentArea.addEventListener("scroll", syncActiveSectionFromScroll, { passive: true });

            const initialSection = document.getElementById(activeSectionId);
            if (initialSection) initialSection.scrollIntoView({ block: "start" });
        };
    </script>
</body>
