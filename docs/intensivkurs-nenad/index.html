<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsch Intensivkurs — Interaktive Lernnotizen</title>
    <!-- Outfit & Inter Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Light Theme */
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border-color: #e2e8f0;
            --sidebar-bg: #ffffff;
            --sidebar-active: #f1f5f9;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --accent-light: #e0e7ff;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
            
            /* Highlight Colors (Light Theme) */
            --hl-masc: #1a73e8;
            --hl-fem: #d93025;
            --hl-neut: #188038;
            --hl-plur: #a142f4;
            --hl-verb: #4b0082;
            --hl-verb-border: #4b0082;
            --hl-conj: #ffe082;
            --hl-dat-border: #8ab4f8;
            --hl-akk-border: #81c995;
            --hl-sub-verb-border: #fbc02d;
            --alert-bg-note: #f1f5f9;
            --alert-border-note: #94a3b8;
            --alert-bg-tip: #f0fdf4;
            --alert-border-tip: #4ade80;
        }

        html[data-theme="dark"] {
            /* Dark Theme */
            --bg-primary: #0b0f19;
            --bg-secondary: #131b2e;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #1e293b;
            --sidebar-bg: #0f172a;
            --sidebar-active: #1e293b;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-light: #312e81;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3), 0 2px 4px -2px rgb(0 0 0 / 0.3);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.4), 0 4px 6px -4px rgb(0 0 0 / 0.4);
            
            /* Highlight Colors (Dark Theme) */
            --hl-masc: #42a5f5;
            --hl-fem: #ff5252;
            --hl-neut: #66bb6a;
            --hl-plur: #b388ff;
            --hl-verb: #d1c4e9;
            --hl-verb-border: #b388ff;
            --hl-conj: #ffd54f;
            --hl-dat-border: #42a5f5;
            --hl-akk-border: #66bb6a;
            --hl-sub-verb-border: #ffd54f;
            --alert-bg-note: #1e293b;
            --alert-border-note: #475569;
            --alert-bg-tip: #064e3b;
            --alert-border-tip: #059669;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.2s, border-color 0.2s;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
        }

        h1, h2, h3, h4, .font-display {
            font-family: 'Outfit', sans-serif;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 320px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 100;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .brand-logo {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), #d946ef);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgb(99 102 241 / 0.3);
        }

        .brand-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .search-box {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 10px 16px 10px 38px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgb(99 102 241 / 0.15);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1rem;
            pointer-events: none;
        }

        .sidebar-menu {
            flex-grow: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .menu-category {
            margin-bottom: 24px;
        }

        .category-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            font-weight: 700;
            margin-bottom: 8px;
            padding-left: 8px;
        }

        .menu-list {
            list-style: none;
        }

        .menu-item {
            margin-bottom: 4px;
        }

        .menu-link {
            display: block;
            padding: 8px 12px;
            border-radius: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            transition: color 0.15s, background-color 0.15s;
        }

        .menu-link:hover {
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }

        .menu-link.active {
            background-color: var(--accent);
            color: white;
        }

        /* --- MAIN CONTENT --- */
        .main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .main-header {
            height: 72px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-secondary);
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* Custom Toggle Switch */
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--border-color);
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .btn-theme {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            outline: none;
        }

        .btn-theme:hover {
            background-color: var(--bg-primary);
        }

        .content-area {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            background-color: var(--bg-primary);
        }

        .content-card {
            max-width: 900px;
            margin: 0 auto;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            box-shadow: var(--shadow-lg);
        }

        .note-section {
            scroll-margin-top: 24px;
            padding-top: 8px;
            margin-top: 40px;
        }

        .note-section:first-child {
            margin-top: 0;
            padding-top: 0;
        }

        .note-section + .note-section {
            border-top: 1px solid var(--border-color);
            padding-top: 40px;
        }

        /* --- MOBILE TOGGLE --- */
        .mobile-header {
            display: none;
            position: sticky;
            top: 0;
            height: 60px;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 0 16px;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            z-index: 150;
            flex-shrink: 0;
        }

        .btn-hamburger {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* --- CONTENT STYLING --- */
        .content-card h1 {
            margin-bottom: 24px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
            font-size: 2.2rem;
        }

        .content-card h2 {
            margin-top: 32px;
            margin-bottom: 16px;
            font-size: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .content-card h3 {
            margin-top: 24px;
            margin-bottom: 12px;
            font-size: 1.15rem;
        }

        .content-card p {
            margin-bottom: 16px;
            line-height: 1.7;
            color: var(--text-secondary);
        }

        .content-card hr {
            border: 0;
            height: 1px;
            background-color: var(--border-color);
            margin: 32px 0;
        }

        .content-card blockquote {
            border-left: 4px solid var(--accent);
            padding: 12px 20px;
            background-color: var(--bg-primary);
            margin: 20px 0;
            border-radius: 0 8px 8px 0;
            color: var(--text-primary);
            font-style: italic;
        }

        /* Alerts styling */
        .alert {
            border-left: 4px solid;
            padding: 16px 20px;
            margin: 20px 0;
            border-radius: 0 8px 8px 0;
            line-height: 1.6;
        }

        .alert-note {
            background-color: var(--alert-bg-note);
            border-color: var(--alert-border-note);
            color: var(--text-primary);
        }

        .alert-tip {
            background-color: var(--alert-bg-tip);
            border-color: var(--alert-border-tip);
            color: var(--text-primary);
        }

        .alert-important, .alert-warning, .alert-caution {
            background-color: #fef2f2;
            border-color: #ef4444;
            color: #991b1b;
        }
        html[data-theme="dark"] .alert-important, html[data-theme="dark"] .alert-warning, html[data-theme="dark"] .alert-caution {
            background-color: #451a1a;
            border-color: #f87171;
            color: #fecaca;
        }

        /* Lists */
        .content-card ul, .content-card ol {
            margin-bottom: 20px;
            padding-left: 24px;
        }

        .content-card li {
            margin-bottom: 8px;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        /* Tables */
        .content-card table {
            width: 100%;
            border-collapse: collapse;
            margin: 24px 0;
            font-size: 0.95rem;
            text-align: left;
        }

        .content-card th, .content-card td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .content-card th {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-weight: 600;
        }

        .content-card tr:hover td {
            background-color: var(--sidebar-active);
        }

        .content-card td a, .content-card p a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 550;
            border-bottom: 1px solid transparent;
        }
        .content-card td a:hover, .content-card p a:hover {
            border-color: var(--accent);
        }

        .content-card code {
            background-color: var(--bg-primary);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.85em;
            color: #e01e5a;
        }
        html[data-theme="dark"] .content-card code {
            color: #f472b6;
        }

        .content-card pre {
            background-color: var(--bg-primary);
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid var(--border-color);
            margin: 20px 0;
        }

        .content-card pre code {
            background: none;
            padding: 0;
            color: var(--text-primary);
            font-size: 0.9em;
        }

        /* --- GRAMMAR HIGHLIGHTING CLASSES --- */
        .hl-active .hl-masc {
            color: var(--hl-masc);
            font-weight: bold;
        }
        .hl-active .hl-fem {
            color: var(--hl-fem);
            font-weight: bold;
        }
        .hl-active .hl-neut {
            color: var(--hl-neut);
            font-weight: bold;
        }
        .hl-active .hl-plur {
            color: var(--hl-plur);
            font-weight: bold;
        }
        .hl-active .hl-verb {
            color: var(--hl-verb);
            font-weight: bold;
            border-bottom: 2px dotted var(--hl-verb-border);
        }
        .hl-active .hl-conj {
            background-color: var(--hl-conj);
            padding: 0 4px;
            border-radius: 3px;
            font-weight: bold;
            color: #111827 !important;
        }
        .hl-active .hl-dat {
            border-bottom: 2px solid var(--hl-dat-border);
            padding-bottom: 1px;
        }
        .hl-active .hl-akk {
            border-bottom: 2px solid var(--hl-akk-border);
            padding-bottom: 1px;
        }
        .hl-active .hl-sub-verb {
            font-style: italic;
            border-bottom: 2px double var(--hl-sub-verb-border);
        }

        /* Search highlights */
        .search-highlight {
            background-color: #ffd54f;
            color: black !important;
            padding: 0 2px;
            border-radius: 2px;
            font-weight: bold;
        }

        /* --- RESPONSIVE LAYOUTS --- */
        @media (max-width: 1024px) {
            .sidebar {
                position: fixed;
                top: 0;
                bottom: 0;
                left: -320px;
                z-index: 200;
                transition: transform 0.3s ease;
                height: 100%;
            }
            .sidebar.open {
                transform: translateX(320px);
            }
            .mobile-header {
                display: flex;
            }
            body {
                flex-direction: column;
            }
            .main {
                height: calc(100% - 60px);
            }
            .main-header {
                display: none;
            }
            .content-area {
                padding: 20px;
            }
            .content-card {
                padding: 24px;
            }
        }

        /* Dark/Light Icon styling */
        .icon-sun { display: none; }
        html[data-theme="light"] .icon-moon { display: none; }
        html[data-theme="light"] .icon-sun { display: block; }
    </style>
</head>
<body>

    <!-- Mobile Header -->
    <div class="mobile-header">
        <button class="btn-hamburger" id="hamburgerBtn" onclick="toggleSidebar()">☰</button>
        <h2 class="brand-title" style="margin: 0;">Deutsch Lernen</h2>
        <button class="btn-theme" onclick="toggleTheme()" aria-label="Theme umschalten">
            <!-- Moon Icon -->
            <svg class="icon-moon" width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.38 5.38 0 0 1-4.4 2.26 5.4 5.4 0 0 1-4.14-9.5c.3-.08.58-.14.88-.16-.42-.16-.86-.24-1.24-.24z"/></svg>
            <!-- Sun Icon -->
            <svg class="icon-sun" width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0-5a1 1 0 0 1 1 1v2a1 1 0 0 1-2 0V3a1 1 0 0 1 1-1zm0 16a1 1 0 0 1 1 1v2a1 1 0 0 1-2 0v-2a1 1 0 0 1 1-1zM5.64 5.64a1 1 0 0 1 1.41 0l1.42 1.42a1 1 0 0 1-1.42 1.42L5.64 7.05a1 1 0 0 1 0-1.41zm11.31 11.31a1 1 0 0 1 1.42 0l1.41 1.41a1 1 0 0 1-1.41 1.42l-1.41-1.42a1 1 0 0 1 0-1.41zM2 12a1 1 0 0 1 1-1h2a1 1 0 0 1 0 2H3a1 1 0 0 1-1-1zm16 0a1 1 0 0 1 1-1h2a1 1 0 0 1 0 2h-2a1 1 0 0 1-1-1zM7.05 18.36a1 1 0 0 1 0 1.42l-1.42 1.41a1 1 0 0 1-1.41-1.41l1.42-1.42a1 1 0 0 1 1.41 0zm11.31-11.3a1 1 0 0 1 0-1.42l1.42-1.41a1 1 0 0 1 1.41 1.41l-1.42 1.42a1 1 0 0 1-1.41 0z"/></svg>
        </button>
    </div>

    <!-- Sidebar Menu -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand">
                <div class="brand-logo">DE</div>
                <div class="brand-title">Deutsch-Lernen<br><span style="font-size:0.8rem; font-weight:500; color:var(--text-secondary);">Intensivkurs</span></div>
            </div>
            
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="searchInput" placeholder="Suche in Vokabeln & Grammatik..." oninput="handleSearch()">
            </div>
        </div>
        
        <div class="sidebar-menu" id="sidebarMenu">
            <!-- Sidebar content is rendered dynamically -->
        </div>
    </div>

    <!-- Main Content App -->
    <div class="main">
        <div class="main-header">
            <div class="header-title" id="headerTitle">Lade Notizen...</div>
            
            <div class="header-actions">
                <div class="toggle-container">
                    <span>Grammatik markieren</span>
                    <label class="switch">
                        <input type="checkbox" id="highlightToggle" onchange="toggleHighlight()">
                        <span class="slider"></span>
                    </label>
                </div>
                
                <button class="btn-theme" onclick="toggleTheme()" aria-label="Theme umschalten">
                    <!-- Moon Icon -->
                    <svg class="icon-moon" width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.38 5.38 0 0 1-4.4 2.26 5.4 5.4 0 0 1-4.14-9.5c.3-.08.58-.14.88-.16-.42-.16-.86-.24-1.24-.24z"/></svg>
                    <!-- Sun Icon -->
                    <svg class="icon-sun" width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0-5a1 1 0 0 1 1 1v2a1 1 0 0 1-2 0V3a1 1 0 0 1 1-1zm0 16a1 1 0 0 1 1 1v2a1 1 0 0 1-2 0v-2a1 1 0 0 1 1-1zM5.64 5.64a1 1 0 0 1 1.41 0l1.42 1.42a1 1 0 0 1-1.42 1.42L5.64 7.05a1 1 0 0 1 0-1.41zm11.31 11.31a1 1 0 0 1 1.42 0l1.41 1.41a1 1 0 0 1-1.41 1.42l-1.41-1.42a1 1 0 0 1 0-1.41zM2 12a1 1 0 0 1 1-1h2a1 1 0 0 1 0 2H3a1 1 0 0 1-1-1zm16 0a1 1 0 0 1 1-1h2a1 1 0 0 1 0 2h-2a1 1 0 0 1-1-1zM7.05 18.36a1 1 0 0 1 0 1.42l-1.42 1.41a1 1 0 0 1-1.41-1.41l1.42-1.42a1 1 0 0 1 1.41 0zm11.31-11.3a1 1 0 0 1 0-1.42l1.42-1.41a1 1 0 0 1 1.41 1.41l-1.42 1.42a1 1 0 0 1-1.41 0z"/></svg>
                </button>
            </div>
        </div>
        
        <div class="content-area">
            <div class="content-card" id="contentCard">
                <!-- Dynamic active content goes here -->
            </div>
        </div>
    </div>

    <!-- Embedded Notes Data -->
    <script>
        const appData = {"grammar": [{"id": "grammar-01-verb-conjugation", "title": "Verb Conjugation", "file": "01-verb-conjugation.md", "html": "<h2 id=\"stem-changes--reflexive-verbs\">Stem Changes & Reflexive Verbs</h2>\n<pre><code class=\"language-\">e → i / ie                  Reflexiv                    sein\n──────────                  ────────                    ────\na → ä\n\nich          -e    helfe    ich      wasche mich         bin\n┌────────────────────────────────┐\n│ du         -st   hilfst   ä   │    du       wäschst dich        bist\n│ er                             │    er\n│ sie        -t    hilft    ä   │    sie      wäscht sich         ist\n│ es                             │    es\n└────────────────────────────────┘\nwir          -en   helfen       wir      waschen uns         sind\nihr          -t    helft        ihr      wascht euch         seid\nsie/Sie      -en   helfen       sie/Sie  waschen sich        sind</code></pre>\n<blockquote><strong>Note:</strong> The <code>e → i/ie</code> and <code>a → ä</code> stem changes only occur in the <strong>du/er/sie/es</strong> forms.</blockquote>\n<hr>\n<h2 id=\"irregular-verbs-nehmen--treffen-prsens\">Irregular Verbs: nehmen & treffen (Präsens)</h2>\n<pre><code class=\"language-\">nehmen          treffen\nich nehme       treffe\ndu nimmst       triffst\ner nimmt        trifft\nwir nehmen      treffen\nihr nehmt       trefft\nsie nehmen      treffen</code></pre>\n<hr>\n<h2 id=\"reflexive-pronouns\">Reflexive Pronouns</h2>\n<pre><code class=\"language-\">           Reflexiv (Akk.)    Dativ Reflexiv\n       ┌──────────────────────────────────┐\nich    │   mich                mir        │\ndu     │   dich                dir        │\n       └──────────────────────────────────┘\ner/sie/es  sich                sich\nwir        uns                 uns\nihr        euch                euch\nsie/Sie    sich                sich</code></pre>\n<blockquote>Use <strong>Dativ</strong> reflexive when there is already a direct object (Akkusativ): <code>Ich wasche mir die Hände.</code> <em>(I wash my hands)</em> <code>Ich wasche mich.</code> <em>(I wash myself)</em></blockquote>\n<hr>\n<h2 id=\"prsens-stem-change-summary\">Präsens Stem-Change Summary</h2>\n<table>\n<thead>\n<tr>\n<th>Type</th>\n<th>Example</th>\n<th>du-form</th>\n<th>er-form</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>e → i</code></td>\n<td>sprechen</td>\n<td>sprichst</td>\n<td>spricht</td>\n</tr>\n<tr>\n<td><code>e → ie</code></td>\n<td>lesen</td>\n<td>liest</td>\n<td>liest</td>\n</tr>\n<tr>\n<td><code>a → ä</code></td>\n<td>fahren</td>\n<td>fährst</td>\n<td>fährt</td>\n</tr>\n<tr>\n<td><code>au → äu</code></td>\n<td>laufen</td>\n<td>läufst</td>\n<td>läuft</td>\n</tr>\n</tbody>\n</table>"}, {"id": "grammar-02-perfekt-formation", "title": "Perfekt Formation: The -ge- Rule", "file": "02-perfekt-formation.md", "html": "<h2 id=\"regular-verbs--add-ge--in-the-middle\">Regular verbs → add <strong>ge-</strong> in the middle</h2>\n<table>\n<thead>\n<tr>\n<th>Infinitiv</th>\n<th>Perfekt</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>essen</td>\n<td>hat <strong>ge</strong>gessen</td>\n</tr>\n<tr>\n<td>laufen</td>\n<td>ist <strong>ge</strong>laufen</td>\n</tr>\n<tr>\n<td>rennen</td>\n<td>ist <strong>ge</strong>rannt</td>\n</tr>\n<tr>\n<td>fahren</td>\n<td>ist <strong>ge</strong>fahren</td>\n</tr>\n<tr>\n<td>singen</td>\n<td>hat <strong>ge</strong>sungen</td>\n</tr>\n<tr>\n<td>stellen</td>\n<td>hat <strong>ge</strong>stellt</td>\n</tr>\n<tr>\n<td>(Geld) sparen</td>\n<td>hat <strong>ge</strong>spart</td>\n</tr>\n<tr>\n<td>schützen</td>\n<td>hat <strong>ge</strong>schützt</td>\n</tr>\n<tr>\n<td>sich setzen</td>\n<td>hat sich <strong>ge</strong>setzt</td>\n</tr>\n<tr>\n<td>nehmen</td>\n<td>hat <strong>ge</strong>nommen</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2 id=\"separable-verbs--ge--goes-between-prefix-and-stem\">Separable verbs → <strong>ge-</strong> goes between prefix and stem</h2>\n<table>\n<thead>\n<tr>\n<th>Infinitiv</th>\n<th>Perfekt</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>durch</strong>lesen</td>\n<td>hat <strong>durch</strong>ge<strong>lesen</strong></td>\n</tr>\n<tr>\n<td><strong>nach</strong>denken (über)</td>\n<td>hat <strong>nach</strong>ge<strong>dacht</strong></td>\n</tr>\n<tr>\n<td>sich <strong>aus</strong>ziehen</td>\n<td>hat sich <strong>aus</strong>ge<strong>zogen</strong></td>\n</tr>\n<tr>\n<td><strong>ein</strong>kreisen</td>\n<td>hat <strong>ein</strong>ge<strong>kreist</strong></td>\n</tr>\n</tbody>\n</table>\n<blockquote><strong>Rule:</strong> Separable prefix stays at the front, <strong>-ge-</strong> is inserted before the verb stem.</blockquote>\n<hr>\n<h2 id=\"inseparable-verbs--no-ge-\">Inseparable verbs → <strong>NO ge-</strong></h2>\n<table>\n<thead>\n<tr>\n<th>Infinitiv</th>\n<th>Perfekt</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>über</strong>setzen</td>\n<td>hat <strong>über</strong>setzt <em>(kein ge!)</em></td>\n</tr>\n<tr>\n<td><strong>zu</strong>bereiten</td>\n<td>hat <strong>zu</strong>bereitet <em>(kein ge!)</em></td>\n</tr>\n<tr>\n<td><strong>emp</strong>fangen</td>\n<td>hat <strong>emp</strong>fangen <em>(kein ge!)</em></td>\n</tr>\n<tr>\n<td>sich ernähren</td>\n<td>hat sich ernährt</td>\n</tr>\n</tbody>\n</table>\n<blockquote><strong>Rule:</strong> Verbs with inseparable prefixes (<code>be-</code>, <code>ge-</code>, <code>er-</code>, <code>ver-</code>, <code>zer-</code>, <code>ent-</code>, <code>emp-</code>, <code>miss-</code>, <code>über-</code>, <code>unter-</code> when inseparable) do <strong>not</strong> add <em>ge-</em>.</blockquote>\n<hr>\n<h2 id=\"verbs-ending-in--ieren--no-ge-\">Verbs ending in <strong>-ieren</strong> → <strong>NO ge-</strong></h2>\n<p>These always take <strong>haben</strong> and never add <em>ge-</em>:</p>\n<table>\n<thead>\n<tr>\n<th>Infinitiv</th>\n<th>Perfekt</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>fotografieren</td>\n<td>hat fotografiert</td>\n</tr>\n<tr>\n<td>organisieren</td>\n<td>hat organisiert</td>\n</tr>\n<tr>\n<td>telefonieren</td>\n<td>hat telefoniert</td>\n</tr>\n</tbody>\n</table>\n<hr>\n<h2 id=\"hat-vs-ist\">hat vs. ist</h2>\n<table>\n<thead>\n<tr>\n<th><strong>hat</strong> (transitive / most verbs)</th>\n<th><strong>ist</strong> (movement/change of state)</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>essen, trinken, kochen…</td>\n<td>gehen, fahren, fliegen, laufen…</td>\n</tr>\n<tr>\n<td></td>\n<td>werden, sein, bleiben</td>\n</tr>\n<tr>\n<td></td>\n<td>passieren, aufstehen, umziehen…</td>\n</tr>\n</tbody>\n</table>"}, {"id": "grammar-03-perfekt-a1-lektionen-1-10", "title": "Verben: Perfekt (Panorama A1)", "file": "03-perfekt-a1-lektionen-1-10.md", "html": "<h2 id=\"lektion-1\">Lektion 1</h2>\n<table>\n<thead>\n<tr>\n<th>Infinitiv</th>\n<th>Perfekt</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>heissen</td>\n<td>hat geheissen</td>\n</tr>\n<tr>\n<td>kommen</td>\n<td>ist gekommen</td>\n</tr>\n<tr>\n<td>wohnen</td>\n<td>hat gewohnt</td>\n</tr>\n<tr>\n<td>mögen</td>\n<td>hat gemocht / möchte</td>\n</tr>\n<tr>\n<td>sein</td>\n<td>ist gewesen / war</td>\n</tr>\n<tr>\n<td>lernen</td>\n<td>hat gelernt</td>\n</tr>\n<tr>\n<td>buchstabieren</td>\n<td>hat buchstabiert</td>\n</tr>\n<tr>\n<td>schreiben</td>\n<td>hat geschrieben</td>\n</tr>\n</tbody>\n</table>\n<h2 id=\"lektion-2\">Lektion 2</h2>\n<table>\n<thead>\n<tr>\n<th>Infinitiv</th>\n<th>Perfekt</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>arbeiten</td>\n<td>hat gearbeitet</td>\n</tr>\n<tr>\n<td>machen</td>\n<td>hat gemacht</td>\n</tr>\n</tbody>\n</table>\n<h2 id=\"lektion-3\">Lektion 3</h2>\n<table>\n<thead>\n<tr>\n<th>Infinitiv</th>\n<th>Perfekt</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>verstehen</td>\n<td>hat verstanden</td>\n</tr>\n<tr>\n<td>wiederholen</td>\n<td>hat wiederholt</td>\n</tr>\n<tr>\n<td>fragen</td>\n<td>hat gefragt</td>\n</tr>\n</tbody>\n</table>\n<h2 id=\"lektion-4\">Lektion 4</h2>\n<table>\n<thead>\n<tr>\n<th>Infinitiv</th>\n<th>Perfekt</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>gehen</td>\n<td>i n<td>hat ferngesehen</td>\n</tr>\n<tr>\n<td>sagen</td>\n<td>hat gesagt</td>\n</tr>\n</tbody>\n</table>\n<h2 id=\"lektion-6\">Lektion 6</h2>\n<table>\n<thead>\n<tr>\n<th>Infinitiv</th>\n<th>Perfekt</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>aussehen</td>\n<td>hat ausgesehen</td>\n</tr>\n<tr>\n<td>mitbringen</td>\n<td>hat mitgebracht</td>\n</tr>\n<tr>\n<td>feiern</td>\n<td>hat gefeiert</td>\n</tr>\n<tr>\n<td>schenken</td>\n<td>hat geschenkt</td>\n</tr>\n</tbody>\n</table>\n<h2 id=\"lektion-7\">Lektion 7</h2>\n<table>\n<thead>\n<tr>\n<th>Infinitiv</th>\n<th>Perfekt</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>essen</td>\n<td>hat gegessen</td>\n</tr>\n<tr>\n<td>wollen</td>\n<td>hat gewollt / wollte</td>\n</tr>\n<tr>\n<td>müssen</td>\n<td>hat gemusst / musste</td>\n</tr>\n<tr>\n<td>mitkommen</td>\n<td>ist mitgekommen</td>\n</tr>\n<tr>\n<td>trinken</td>\n<td>hat getrunken</td>\n</tr>\n<tr>\n<td>grillen</td>\n<td>hat gegrillt</td>\n</tr>\n<tr>\n<td>frühstücken</td>\n<td>hat gefrühstückt</td>\n</tr>\n<tr>\n<td>nehmen</td>\n<td>hat genommen</td>\n</tr>\n</tbody>\n</table>\n<h2 id=\"lektion-8\">Lektion 8</h2>\n<table>\n<thead>\n<tr>\n<th>Infinitiv</th>\n<th>Perfekt</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>frei haben</td>\n<td>hat frei gehabt</td>\n</tr>\n<tr>\n<td>aufstehen</td>\n<td>ist aufgestanden</td>\n</tr>\n<tr>\n<td>ausschlafen</td>\n<td>hat ausgeschlafen</td>\n</tr>\n<tr>\n<td>können</td>\n<td>hat gekonnt / konnte</td>\n</tr>\n<tr>\n<td>holen</td>\n<td>hat geholt</td>\n</tr>\n<tr>\n<td>abholen</td>\n<td>hat abgeholt</td>\n</tr>\n<tr>\n<td>telefonieren</td>\n<td>hat telefoniert</td>\n</tr>\n<tr>\n<td>bleiben</td>\n<td>ist geblieben</td>\n</tr>\n<tr>\n<td>bezahlen</td>\n<td>hat bezahlt</td>\n</tr>\n<tr>\n<td>verkaufen</td>\n<td>hat verkauft</td>\n</tr>\n</tbody>\n</table>\n<h2 id=\"lektion-9\">Lektion 9</h2>\n<table>\n<thead>\n<tr>\n<th>Infinitiv</th>\n<th>Perfekt</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>fliegen</td>\n<td>ist geflogen</td>\n</tr>\n<tr>\n<td>fahren</td>\n<
